<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SaaS Subscriptions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #11151c;
      --ink-soft: #5b6472;
      --line: #e6eaf2;
      --accent: #4f46e5;
      --accent-soft: #eef0ff;
      --good: #10b981;
      --shadow: 0 1px 2px rgba(17, 21, 28, .04), 0 4px 12px rgba(17, 21, 28, .04);
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    main { max-width: 1200px; margin: 0 auto; padding: 28px; }

    header.page {
      display: flex; align-items: end; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    header.page h1 { font-size: 26px; margin: 0; letter-spacing: -0.02em; }
    header.page p { color: var(--ink-soft); margin: 0; font-size: 13px; }
    header.page .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-soft); color: var(--accent);
      padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
    }
    header.page .badge::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--good); box-shadow: 0 0 0 3px rgba(16,185,129,.2);
    }

    /* Filter bar */
    .filters {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 14px 16px; box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .filters label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--ink-soft); }
    .filters select, .filters button {
      font: inherit; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--line);
      background: var(--card); color: var(--ink); min-width: 160px;
    }
    .filters select:focus, .filters button:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
    .filters .reset {
      margin-left: auto; cursor: pointer; background: var(--accent-soft); color: var(--accent);
      border: none; font-weight: 600; min-width: 0;
    }
    .filters .reset:hover { background: #e0e3ff; }
    .filters .count {
      margin-left: auto; color: var(--ink-soft); font-variant-numeric: tabular-nums;
    }

    /* KPI tiles */
    .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 18px 20px; box-shadow: var(--shadow);
    }
    .kpi .label { color: var(--ink-soft); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi .value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-top: 4px; }

    /* Charts grid */
    .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 20px; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 18px 20px; box-shadow: var(--shadow);
    }
    .card h2 { font-size: 14px; margin: 0 0 12px; font-weight: 600; }
    .card .chart-wrap { position: relative; height: 280px; }

    /* Data table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
    th {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--ink-soft); font-weight: 600;
    }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tbody tr:hover { background: var(--bg); }
    .pill {
      display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600;
    }
    .pill.active { background: rgba(16,185,129,.12); color: #047857; }
    .pill.trial { background: var(--accent-soft); color: var(--accent); }
    .pill.churned { background: #fdecef; color: #b42318; }

    .err {
      background: #fff5f5; color: #b00020; border: 1px solid #fcc;
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin: 12px 0;
      white-space: pre-wrap; font-family: ui-monospace, monospace;
    }

    @media (max-width: 800px) {
      .kpis, .grid { grid-template-columns: 1fr; }
      main { padding: 18px; }
    }
  </style>
</head>
<body>

<main>
  <header class="page">
    <div>
      <h1>SaaS Subscriptions</h1>
      <p>Live data from <code>subscriptions.malloy</code> · edits hot-reload automatically</p>
    </div>
    <span class="badge">connected</span>
  </header>

  <div class="filters" id="filters">
    <label>
      Plan
      <select id="f-plan"><option value="">All plans</option></select>
    </label>
    <label>
      Industry
      <select id="f-industry"><option value="">All industries</option></select>
    </label>
    <label>
      Country
      <select id="f-country"><option value="">All countries</option></select>
    </label>
    <span class="count" id="row-count">…</span>
    <button class="reset" id="reset">Reset</button>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="label">Active MRR</div><div class="value" id="kpi-mrr">…</div></div>
    <div class="kpi"><div class="label">Active subscriptions</div><div class="value" id="kpi-active">…</div></div>
    <div class="kpi"><div class="label">Churn rate</div><div class="value" id="kpi-churn">…</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>New MRR by month</h2>
      <div class="chart-wrap"><canvas id="mrrByMonth"></canvas></div>
    </div>
    <div class="card">
      <h2>Plan mix</h2>
      <div class="chart-wrap"><canvas id="planMix"></canvas></div>
    </div>
  </div>

  <div class="card">
    <h2>Accounts</h2>
    <div style="overflow-x: auto">
      <table id="rows">
        <thead>
          <tr>
            <th>Account</th><th>Plan</th><th>Industry</th><th>Country</th>
            <th class="num">Seats</th><th class="num">MRR</th><th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="errors"></div>
</main>

<script src="/sdk/publisher.js"></script>
<!-- Vendored rather than loaded from a CDN: agent sandboxes and many corporate networks block CDNs,
     and a blocked CDN leaves the page half-drawn: the script never runs, so the
     charts and everything drawn after them come up empty.
     This is chart.js@4.5.0's dist/chart.umd.js (MIT), minus its trailing
     sourceMappingURL line since the .map file is not vendored. -->
<script src="./vendor/chart.umd.js"></script>
<script type="module">
  const MODEL = "subscriptions.malloy";
  const usd = (n) => (n ?? 0).toLocaleString(undefined, { style: "currency", currency: "USD", maximumFractionDigits: 0 });
  const pct = (n) => `${((n ?? 0) * 100).toFixed(1)}%`;
  const esc = (s) => String(s ?? "").replace(/[<>&"]/g, c => ({ "<":"&lt;", ">":"&gt;", "&":"&amp;", '"':"&quot;" }[c]));

  function showError(where, e) {
    console.error(where, e);
    const div = document.createElement("div");
    div.className = "err";
    div.textContent = `${where}: ${e?.message ?? e}`;
    document.getElementById("errors").appendChild(div);
  }

  // ---- query builder --------------------------------------------------
  // Compose a where: clause from the current filter state. Values come only
  // from the model's own distinct dimension values (the dropdowns below), so
  // they're safe to interpolate. For free-text input, declare a given: instead.
  const state = { plan: "", industry: "", country: "" };
  function whereClause() {
    const c = [];
    if (state.plan) c.push(`plan = '${state.plan.replace(/'/g, "''")}'`);
    if (state.industry) c.push(`industry = '${state.industry.replace(/'/g, "''")}'`);
    if (state.country) c.push(`country = '${state.country.replace(/'/g, "''")}'`);
    return c.length ? ` + { where: ${c.join(" and ")} }` : "";
  }
  const q = (body) => Publisher.query(MODEL, `${body}${whereClause()}`);

  // ---- charts ---------------------------------------------------------
  let monthChart = null, planChart = null;
  const PLAN_COLORS = ["#4f46e5", "#7c3aed", "#ec4899", "#10b981", "#f59e0b"];

  function renderMonth(rows) {
    const labels = rows.map(r => String(r.cohort_month ?? "").slice(0, 7));  // YYYY-MM
    const data = rows.map(r => r.new_mrr);
    if (monthChart) { monthChart.data.labels = labels; monthChart.data.datasets[0].data = data; monthChart.update(); return; }
    monthChart = new Chart(document.getElementById("mrrByMonth"), {
      type: "line",
      data: { labels, datasets: [{ label: "New MRR", data, borderColor: "#4f46e5", backgroundColor: "rgba(79,70,229,.1)", fill: true, tension: 0.3, pointRadius: 2 }] },
      options: {
        responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { callback: v => usd(v) }, grid: { color: "#eef0ff" } }, x: { grid: { display: false } } },
      },
    });
  }

  function renderPlanMix(rows) {
    const labels = rows.map(r => r.plan);
    const data = rows.map(r => r.account_count);
    if (planChart) { planChart.data.labels = labels; planChart.data.datasets[0].data = data; planChart.update(); return; }
    planChart = new Chart(document.getElementById("planMix"), {
      type: "doughnut",
      data: { labels, datasets: [{ data, backgroundColor: PLAN_COLORS, borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: "60%",
        plugins: { legend: { position: "bottom", labels: { boxWidth: 10, boxHeight: 10, padding: 12 } } },
      },
    });
  }

  function renderTable(rows) {
    const cls = (s) => ({ Active: "active", Trial: "trial", Churned: "churned" }[s] || "");
    const tbody = document.querySelector("#rows tbody");
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${esc(r.account_name)}</td>
        <td>${esc(r.plan)}</td>
        <td>${esc(r.industry)}</td>
        <td>${esc(r.country)}</td>
        <td class="num">${(r.seats ?? 0).toLocaleString()}</td>
        <td class="num">${usd(r.mrr)}</td>
        <td><span class="pill ${cls(r.status)}">${esc(r.status)}</span></td>
      </tr>`).join("");
    document.getElementById("row-count").textContent =
      `${rows.length.toLocaleString()} ${rows.length === 1 ? "account" : "accounts"}`;
  }

  function renderKpis(k) {
    document.getElementById("kpi-mrr").textContent = usd(k.active_mrr);
    document.getElementById("kpi-active").textContent = (k.active_count ?? 0).toLocaleString();
    document.getElementById("kpi-churn").textContent = pct(k.churn_rate);
  }

  // ---- load + refresh -------------------------------------------------
  async function populateFilters() {
    // Unfiltered distinct values so the dropdowns always list every option.
    const [plans, industries, countries] = await Promise.all([
      Publisher.query(MODEL, "run: subscriptions -> plan_mix"),
      Publisher.query(MODEL, "run: subscriptions -> mrr_by_industry"),
      Publisher.query(MODEL, "run: subscriptions -> mrr_by_country"),
    ]);
    const fill = (id, rows, key) => {
      const sel = document.getElementById(id);
      for (const r of rows) { const o = document.createElement("option"); o.value = o.textContent = r[key]; sel.appendChild(o); }
    };
    fill("f-plan", plans, "plan");
    fill("f-industry", industries, "industry");
    fill("f-country", countries, "country");
  }

  async function refresh() {
    try {
      const [kpiRows, byMonth, planMix, accounts] = await Promise.all([
        q("run: subscriptions -> kpis"),
        q("run: subscriptions -> mrr_by_month"),
        q("run: subscriptions -> plan_mix"),
        q("run: subscriptions -> accounts + { limit: 100 }"),
      ]);
      renderKpis(kpiRows[0] ?? {});
      renderMonth(byMonth);
      renderPlanMix(planMix);
      renderTable(accounts);
    } catch (e) {
      showError("Refresh", e);
    }
  }

  document.getElementById("f-plan").addEventListener("change", e => { state.plan = e.target.value; refresh(); });
  document.getElementById("f-industry").addEventListener("change", e => { state.industry = e.target.value; refresh(); });
  document.getElementById("f-country").addEventListener("change", e => { state.country = e.target.value; refresh(); });
  document.getElementById("reset").addEventListener("click", () => {
    state.plan = ""; state.industry = ""; state.country = "";
    document.getElementById("f-plan").value = "";
    document.getElementById("f-industry").value = "";
    document.getElementById("f-country").value = "";
    refresh();
  });

  populateFilters().catch(e => showError("Loading filters", e));
  refresh();
</script>
</body>
</html>
