<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Storefront</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f5f7fb; --card: #ffffff; --ink: #11151c; --ink-soft: #5b6472;
      --line: #e6eaf2; --accent: #4f46e5; --accent-soft: #eef0ff; --good: #10b981;
      --shadow: 0 1px 2px rgba(17,21,28,.04), 0 4px 12px rgba(17,21,28,.04); --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      color: var(--ink); background: var(--bg); min-height: 100vh;
    }
    main { max-width: 1200px; margin: 0 auto; padding: 28px; }
    header.page { display: flex; align-items: end; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    header.page h1 { font-size: 26px; margin: 0; letter-spacing: -0.02em; }
    header.page p { color: var(--ink-soft); margin: 0; font-size: 13px; }
    header.page .badge {
      display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft);
      color: var(--accent); padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
    }
    header.page .badge::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--good); box-shadow: 0 0 0 3px rgba(16,185,129,.2);
    }
    .filters {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap; background: var(--card);
      border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px;
      box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .filters label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--ink-soft); }
    .filters select, .filters button {
      font: inherit; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--line);
      background: var(--card); color: var(--ink); min-width: 170px;
    }
    .filters .reset {
      margin-left: auto; cursor: pointer; background: var(--accent-soft); color: var(--accent);
      border: none; font-weight: 600; min-width: 0;
    }
    .filters .reset:hover { background: #e0e3ff; }
    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
    .kpi .label { color: var(--ink-soft); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi .value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
    .card h2 { font-size: 14px; margin: 0 0 12px; font-weight: 600; }
    .card .chart-wrap { position: relative; height: 280px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
    th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft); font-weight: 600; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tbody tr:hover { background: var(--bg); }
    .err { background: #fff5f5; color: #b00020; border: 1px solid #fcc; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin: 12px 0; white-space: pre-wrap; font-family: ui-monospace, monospace; }
    @media (max-width: 900px) { .kpis, .grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .kpis, .grid { grid-template-columns: 1fr; } main { padding: 18px; } }
  </style>
</head>
<body>
<main>
  <header class="page">
    <div>
      <h1>Storefront</h1>
      <p>Live data from <code>storefront.malloy</code> · edits hot-reload automatically</p>
    </div>
    <span class="badge">connected</span>
  </header>

  <div class="filters" id="filters">
    <label>
      Category
      <select id="f-category"><option value="">All categories</option></select>
    </label>
    <label>
      Customer state
      <select id="f-state"><option value="">All states</option></select>
    </label>
    <span class="count" id="row-count" style="margin-left:auto;color:var(--ink-soft)">…</span>
    <button class="reset" id="reset">Reset</button>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="label">Total sales</div><div class="value" id="kpi-sales">…</div></div>
    <div class="kpi"><div class="label">Orders</div><div class="value" id="kpi-orders">…</div></div>
    <div class="kpi"><div class="label">Customers</div><div class="value" id="kpi-customers">…</div></div>
    <div class="kpi"><div class="label">Avg order value</div><div class="value" id="kpi-aov">…</div></div>
  </div>

  <div class="grid">
    <div class="card"><h2>Revenue by category</h2><div class="chart-wrap"><canvas id="byCategory"></canvas></div></div>
    <div class="card"><h2>Monthly trend</h2><div class="chart-wrap"><canvas id="byMonth"></canvas></div></div>
  </div>

  <div class="card">
    <h2>Top products</h2>
    <div style="overflow-x: auto">
      <table id="products">
        <thead>
          <tr><th>Product</th><th class="num">Sales</th><th class="num">Margin</th><th class="num">Items</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="errors"></div>
</main>

<script src="/sdk/publisher.js"></script>
<!-- Vendored rather than loaded from a CDN: agent sandboxes and many corporate networks block CDNs,
     and a blocked CDN leaves the page half-drawn: the script never runs, so the
     charts and everything drawn after them come up empty.
     This is chart.js@4.5.0's dist/chart.umd.js (MIT), minus its trailing
     sourceMappingURL line since the .map file is not vendored. -->
<script src="./vendor/chart.umd.js"></script>
<script type="module">
  const MODEL = "storefront.malloy";
  const usd = (n) => (n ?? 0).toLocaleString(undefined, { style: "currency", currency: "USD", maximumFractionDigits: 0 });
  const esc = (s) => String(s ?? "").replace(/[<>&"]/g, c => ({ "<":"&lt;", ">":"&gt;", "&":"&amp;", '"':"&quot;" }[c]));
  function showError(where, e) {
    console.error(where, e);
    const div = document.createElement("div");
    div.className = "err";
    div.textContent = `${where}: ${e?.message ?? e}`;
    document.getElementById("errors").appendChild(div);
  }

  // ---- query builder --------------------------------------------------
  // Compose a where: clause from the current filter state. Values come only
  // from the model's own distinct dimension values (the dropdowns below), so
  // they're safe to interpolate. For free-text input, declare a given: instead.
  const state = { category: "", customerState: "" };
  function whereClause() {
    const c = [];
    if (state.category) c.push(`products.category = '${state.category.replace(/'/g, "''")}'`);
    if (state.customerState) c.push(`customers.state = '${state.customerState.replace(/'/g, "''")}'`);
    return c.length ? ` + { where: ${c.join(" and ")} }` : "";
  }
  const q = (body) => Publisher.query(MODEL, `${body}${whereClause()}`);

  // ---- charts ---------------------------------------------------------
  let catChart = null, monthChart = null;
  function renderCategory(rows) {
    const labels = rows.map(r => r.category);
    const data = rows.map(r => r.total_sales);
    if (catChart) { catChart.data.labels = labels; catChart.data.datasets[0].data = data; catChart.update(); return; }
    catChart = new Chart(document.getElementById("byCategory"), {
      type: "bar",
      data: { labels, datasets: [{ label: "Revenue", data, backgroundColor: "#4f46e5", borderRadius: 6, maxBarThickness: 40 }] },
      options: {
        responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { callback: v => usd(v) }, grid: { color: "#eef0ff" } }, x: { grid: { display: false } } },
      },
    });
  }
  function renderMonth(rows) {
    const labels = rows.map(r => String(r.order_month ?? "").slice(0, 7));   // YYYY-MM
    const data = rows.map(r => r.total_sales);
    if (monthChart) { monthChart.data.labels = labels; monthChart.data.datasets[0].data = data; monthChart.update(); return; }
    monthChart = new Chart(document.getElementById("byMonth"), {
      type: "line",
      data: { labels, datasets: [{ label: "Revenue", data, borderColor: "#4f46e5", backgroundColor: "rgba(79,70,229,.1)", fill: true, tension: 0.3, pointRadius: 2 }] },
      options: {
        responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { callback: v => usd(v) }, grid: { color: "#eef0ff" } }, x: { grid: { display: false } } },
      },
    });
  }
  function renderProducts(rows) {
    const tbody = document.querySelector("#products tbody");
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${esc(r.name)}</td>
        <td class="num">${usd(r.total_sales)}</td>
        <td class="num">${usd(r.total_margin)}</td>
        <td class="num">${(r.order_item_count ?? 0).toLocaleString()}</td>
      </tr>`).join("");
    document.getElementById("row-count").textContent =
      `${rows.length.toLocaleString()} ${rows.length === 1 ? "product" : "products"}`;
  }
  function renderKpis(k) {
    document.getElementById("kpi-sales").textContent = usd(k.total_sales);
    document.getElementById("kpi-orders").textContent = (k.order_count ?? 0).toLocaleString();
    document.getElementById("kpi-customers").textContent = (k.customer_count ?? 0).toLocaleString();
    document.getElementById("kpi-aov").textContent = usd(k.avg_order_value);
  }

  // ---- load + refresh -------------------------------------------------
  async function populateFilters() {
    // Unfiltered distinct values so the dropdowns always list every option.
    const [cats, states] = await Promise.all([
      Publisher.query(MODEL, "run: order_items -> by_category"),
      Publisher.query(MODEL, "run: order_items -> sales_by_state"),
    ]);
    const catSel = document.getElementById("f-category");
    for (const r of cats) { const o = document.createElement("option"); o.value = o.textContent = r.category; catSel.appendChild(o); }
    const stSel = document.getElementById("f-state");
    for (const r of states) { const o = document.createElement("option"); o.value = o.textContent = r.state; stSel.appendChild(o); }
  }

  async function refresh() {
    try {
      const [kpiRows, byCat, byMonth, top] = await Promise.all([
        q("run: order_items -> { aggregate: total_sales, order_count, customer_count, avg_order_value }"),
        q("run: order_items -> by_category"),
        q("run: order_items -> sales_by_month"),
        q("run: order_items -> top_products"),
      ]);
      renderKpis(kpiRows[0] ?? {});
      renderCategory(byCat);
      renderMonth(byMonth);
      renderProducts(top);
    } catch (e) {
      showError("Refresh", e);
    }
  }

  document.getElementById("f-category").addEventListener("change", e => { state.category = e.target.value; refresh(); });
  document.getElementById("f-state").addEventListener("change", e => { state.customerState = e.target.value; refresh(); });
  document.getElementById("reset").addEventListener("click", () => {
    state.category = ""; state.customerState = "";
    document.getElementById("f-category").value = "";
    document.getElementById("f-state").value = "";
    refresh();
  });

  populateFilters().catch(e => showError("Loading filters", e));
  refresh();
</script>
</body>
</html>
