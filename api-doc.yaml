  # NOTE: The GET …/packages/{packageName}/connections/{connectionName}/queryData
  # endpoint was removed alongside the operational-guards changes.
  # Use the matching POST …/sqlQuery endpoint instead.

  /environments/{environmentName}/packages:
    get:
      tags:
        - packages
      operationId: list-packages
      summary: List environment packages
      description: |
        Retrieves a list of all Malloy packages within the specified environment. Each package
        contains models, notebooks, databases, and other resources. This endpoint is useful
        for discovering available packages and their basic metadata.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      responses:
        "200":
          description: A list of all packages in the environment
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    post:
      tags:
        - packages
      operationId: create-package
      summary: Create a new package
      description: |
        Creates a new Malloy package within the specified environment. A package serves as a
        container for models, notebooks, embedded databases, and other resources. The package
        will be initialized with the provided metadata and can immediately accept content.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Package"
      responses:
        "200":
          description: Returns the package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/packages/{packageName}:
    get:
      tags:
        - packages
      operationId: get-package
      summary: Get package details and metadata
      description: |
        Retrieves detailed information about a specific package, including its models, notebooks,
        databases, and metadata. The reload parameter can be used to refresh the package state
        from disk before returning the information. The versionId parameter allows access to
        specific package versions.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Package name
          required: true
          schema:
            type: string
        - name: versionId
          in: query
          description: Version identifier for the package
          required: false
          schema:
            $ref: "#/components/schemas/VersionIdPattern"
        - name: reload
          in: query
          description: Load / reload the package before returning result
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Package details and metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    patch:
      tags:
        - packages
      operationId: update-package
      summary: Update package configuration
      description: |
        Updates the configuration and metadata of an existing package. This allows you to
        modify package settings, update the description, change the location, or update other
        package-level properties. The package must exist and be accessible.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Package"
      responses:
        "200":
          description: Returns the package updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    delete:
      tags:
        - packages
      operationId: delete-package
      summary: Delete a package
      description: |
        Permanently deletes a package and all its associated resources including models,
        notebooks, databases, and metadata. This operation cannot be undone, so use with caution.
        The package must exist and be accessible for deletion.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      responses:
        "200":
          description: Returns the package deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/packages/{packageName}/models:
    get:
      tags:
        - models
      operationId: list-models
      summary: List package models
      description: |
        Retrieves a list of all Malloy models within the specified package. Each model entry
        includes the relative path, package name, and any compilation errors. This endpoint
        is useful for discovering available models and checking their status.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: versionId
          in: query
          description: Version identifier for the package
          required: false
          schema:
            $ref: "#/components/schemas/VersionIdPattern"
      responses:
        "200":
          description: A list of models in the package
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Model"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/packages/{packageName}/models/{path}:
    get:
      tags:
        - models
      operationId: get-model
      summary: Get compiled Malloy model
      description: |
        Retrieves a compiled Malloy model with its source information, queries, and metadata.
        The model is compiled using the specified version of the Malloy compiler. This endpoint
        provides access to the model's structure, sources, and named queries for use in applications.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            type: string
        - name: path
          in: path
          description: Path to the model within the package
          required: true
          schema:
            $ref: "#/components/schemas/PathPattern"
        - name: versionId
          in: query
          description: Version identifier for the package
          required: false
          schema:
            $ref: "#/components/schemas/VersionIdPattern"
      responses:
        "200":
          description: Compiled Malloy model
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/CompiledModel"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "424":
          $ref: "#/components/responses/ModelCompilationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /environments/{environmentName}/packages/{packageName}/models/{path}/query:
    post:
      tags:
        - models
      operationId: execute-query-model
      summary: Execute Malloy query
      description: |
        Executes a Malloy query against a model and returns the results. The query can be specified
        as a raw Malloy query string or by referencing a named query within the model. This endpoint
        supports both ad-hoc queries and predefined model queries, making it flexible for various
        use cases including data exploration, reporting, and application integration.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            $ref: "#/components/schemas/VersionIdPattern"
        - name: path
          in: path
          description: Path to the model within the package
          required: true
          schema:
            $ref: "#/components/schemas/PathPattern"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query execution results
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/QueryResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /environments/{environmentName}/packages/{packageName}/models/{path}/compile:
    post:
      tags:
        - models
      operationId: compile-model-source
      summary: Compile Malloy source code
      description: |
        Compiles Malloy source code in the context of a specific model file.
        The submitted source is appended to the full model content, giving it
        access to all sources, imports, and queries defined in the model.
        Relative imports resolve correctly against sibling model files.
        Returns compilation status and any problems (errors or warnings) found.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            type: string
        - name: path
          in: path
          description:
            Path to the model within the package (used to resolve relative
            imports)
          required: true
          schema:
            $ref: "#/components/schemas/PathPattern"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompileRequest"
      responses:
        "200":
          description: Compilation result with status and any problems
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompileResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/packages/{packageName}/notebooks:
