openapi: 3.1.0
info:
  title: Malloy Publisher - Semantic Model Serving API
  description: |
    The Malloy Publisher - Semantic Model Serving API provides comprehensive access to Malloy packages and their associated resources.
    A Malloy package is a directory containing Malloy models (.malloy files), Malloy notebooks (.malloynb files), and embedded databases
    (.parquet files) with a malloy-publisher.json manifest at the package's root directory.

    ## Key Features

    - **Environment Management**: Create and manage environments with their associated packages and connections
    - **Package Lifecycle**: Full CRUD operations for Malloy packages and their versions
    - **Model & Notebook Access**: Retrieve and execute Malloy models and notebooks
    - **Connection Management**: Secure database connection configuration and testing
    - **Query Execution**: Execute queries against models and retrieve results
    - **Watch Mode**: Real-time file watching for development workflows

    ## Resource Hierarchy

    The API follows a hierarchical resource structure:
    ```
    Environments
    ├── Connections
    └── Packages
        ├── Models
        ├── Notebooks
        └── Databases
    ```

    For examples, see the Malloy samples packages (https://github.com/malloydata/malloy-samples) repository.
  version: v0

servers:
  - url: /api/v0/
    description: PublisherAPI server

tags:
  - name: publisher
    description: Publisher status and health check operations
  - name: environments
    description:
      Environment lifecycle management including creation, configuration,
      and deletion of data modeling environments
  - name: connections
    description:
      Database connection management for secure data source configuration
      and access
  - name: packages
    description:
      Package management for Malloy data models, including versioning and
      distribution
  - name: models
    description: Malloy model access and compilation operations
  - name: notebooks
    description: Malloy notebook access and execution operations
  - name: pages
    description: Static HTML pages (in-package data apps)
  - name: databases
    description: Embedded database management and access
  - name: watch-mode
    description: Real-time file watching for development workflows
  - name: materializations
    description: Package-level materializations for persisting Malloy sources

paths:
  /status:
    get:
      tags:
        - publisher
      operationId: get-status
      summary: Get server status and health information
      description: |
        Returns the current status of the Malloy Publisher server, including initialization state,
        available environments, and server timestamp. This endpoint is useful for health checks and
        monitoring server availability.
      responses:
        "200":
          description: Returns server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatus"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /theme:
    get:
      tags:
        - publisher
      operationId: get-theme
      summary: Get the active instance theme
      description: |
        Returns the theme used by the Malloy renderer for charts/tables/dashboards.
        Reflects edits made via the in-app Theme Editor (persisted to the
        server's internal DuckDB metadata store via the shared StorageManager).
        Empty object when no theme has been configured.
      responses:
        "200":
          description: Active theme.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    put:
      tags:
        - publisher
      operationId: update-theme
      summary: Save the instance theme
      description: |
        Persists the supplied theme as the new instance theme. Returns the saved
        theme. Rejected with 403 when publisher.config.json has frozenConfig=true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Theme"
      responses:
        "200":
          description: Saved theme.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    delete:
      tags:
        - publisher
      operationId: delete-theme
      summary: Reset the instance theme to the boot seed or default
      description: |
        Drops the saved theme from the server. The next GET returns either the
        publisher.config.json boot seed (if present) or an empty object.
        Rejected with 403 when publisher.config.json has frozenConfig=true.
      responses:
        "200":
          description: Theme after reset (boot seed or empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /environments:
    get:
      tags:
        - environments
      operationId: list-environments
      summary: List all available environments
      description: |
        Retrieves a list of all environments currently hosted on this Malloy Publisher server.
        Each environment contains metadata about its packages, connections, and configuration.
        This endpoint is typically used to discover available environments and their basic information.
      responses:
        "200":
          description: A list of all available environments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Environment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    post:
      tags:
        - environments
      operationId: create-environment
      summary: Create a new environment
      description: |
        Creates a new Malloy environment with the specified configuration. An environment serves as a
        container for packages, connections, and other resources. The environment will be initialized
        with the provided metadata and can immediately accept packages and connections.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Environment"
      responses:
        "200":
          description: Returns the environment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}:
    get:
      tags:
        - environments
      operationId: get-environment
      summary: Get environment details and metadata
      description: |
        Retrieves detailed information about a specific environment, including its packages,
        connections, configuration, and metadata. The reload parameter can be used to
        refresh the environment state from disk before returning the information.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: reload
          in: query
          description: Load / reload the environment before returning result
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Environment details and metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    patch:
      tags:
        - environments
      operationId: update-environment
      summary: Update environment configuration
      description: |
        Updates the configuration and metadata of an existing environment. This allows you to
        modify environment settings, update the README, change the location, or update other
        environment-level properties. The environment must exist and be accessible.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Environment"
      responses:
        "200":
          description: Returns the environment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    delete:
      tags:
        - environments
      operationId: delete-environment
      summary: Delete an environment
      description: |
        Permanently deletes an environment and all its associated resources including packages,
        connections, and metadata. This operation cannot be undone, so use with caution.
        The environment must exist and be accessible for deletion.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      responses:
        "200":
          description: Returns the environment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/connections:
    get:
      tags:
        - connections
      operationId: list-connections
      summary: List environment database connections
      description: |
        Retrieves a list of all database connections configured for the specified environment.
        Each connection includes its configuration, type, and status information. This endpoint
        is useful for discovering available data sources within an environment.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      responses:
        "200":
          description: A list of database connections in the environment
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Connection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/connections/{connectionName}:
    get:
      tags:
        - connections
      operationId: get-connection
      summary: Get connection details
      description: |
        Retrieves detailed information about a specific database connection within an environment.
        This includes connection configuration, credentials (if accessible), and metadata.
        Useful for inspecting connection settings and troubleshooting connectivity issues.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      responses:
        "200":
          description: Connection details and configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    post:
      tags:
        - connections
      operationId: create-connection
      summary: Create a new database connection
      description: |
        Creates a new database connection in the specified environment.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Connection"
      responses:
        "201":
          description: Connection created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Connection already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    patch:
      tags:
        - connections
      operationId: update-connection
      summary: Update an existing database connection
      description: |
        Updates the configuration of an existing database connection.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection to update
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                proxy:
                  $ref: "#/components/schemas/ConnectionProxy"
                postgresConnection:
                  $ref: "#/components/schemas/PostgresConnection"
                mysqlConnection:
                  $ref: "#/components/schemas/MysqlConnection"
                bigqueryConnection:
                  $ref: "#/components/schemas/BigqueryConnection"
                snowflakeConnection:
                  $ref: "#/components/schemas/SnowflakeConnection"
                duckdbConnection:
                  $ref: "#/components/schemas/DuckdbConnection"
                motherduckConnection:
                  $ref: "#/components/schemas/MotherDuckConnection"
                trinoConnection:
                  $ref: "#/components/schemas/TrinoConnection"
                databricksConnection:
                  $ref: "#/components/schemas/DatabricksConnection"
                ducklakeConnection:
                  $ref: "#/components/schemas/DucklakeConnection"
      responses:
        "200":
          description: Connection updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    delete:
      tags:
        - connections
      operationId: delete-connection
      summary: Delete a database connection
      description: |
        Permanently deletes a database connection from the environment.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection to delete
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      responses:
        "200":
          description: Connection deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/connections/{connectionName}/schemas:
    get:
      tags:
        - connections
      operationId: list-schemas
      summary: List database schemas
      description: |
        Retrieves a list of all schemas (databases) available in the specified connection.
        Each schema includes metadata such as name, description, and whether it's the default schema.
        This endpoint is useful for exploring the database structure and discovering available data sources.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      responses:
        "200":
          description: A list of schemas available in the connection with metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/connections/{connectionName}/schemas/{schemaName}/tables:
    get:
      tags:
        - connections
      operationId: list-tables
      summary: List tables in database
      description: |
        Retrieves a list of all tables and views available in the specified database schema.
        This endpoint is useful for discovering available data sources and exploring the database
        structure. The schema must exist in the connection for this operation to succeed.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: schemaName
          in: path
          description: Name of the schema
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: tableNames
          in: query
          description: |
            List of table names to filter results. When provided, only returns metadata
            for the specified tables. When omitted, returns all tables in the schema.
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: A list of table names available in the specified schema
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Table"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/connections/{connectionName}/schemas/{schemaName}/tables/{tablePath}:
    get:
      tags:
        - connections
      operationId: get-table
      summary: Get table details from database
      description: |
        Retrieves a table from the specified database schema.
        This endpoint is useful for discovering available data sources and exploring the database
        structure. The schema must exist in the connection for this operation to succeed.
        The tablePath is the full path to the table, including the schema name.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: schemaName
          in: path
          description: Name of the schema
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: tablePath
          in: path
          description: Full path to the table
          required: true
          schema:
            $ref: "#/components/schemas/PathPattern"
      responses:
        "200":
          description: Table information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/connections/{connectionName}/sqlSource:
    post:
      tags:
        - connections
      operationId: post-sqlsource
      summary: Create SQL source from statement
      description: |
        Creates a Malloy source from a SQL statement using the specified database connection.
        The SQL statement is executed to generate a source definition that can be used in Malloy models.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      requestBody:
        description: SQL statement to fetch the SQL source
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sqlStatement:
                  type: string
      responses:
        "200":
          description: SQL source information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SqlSource"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/connections/{connectionName}/sqlQuery:
    post:
      tags:
        - connections
      operationId: post-querydata
      summary: Execute SQL query
      description: |
        Executes a SQL statement against the specified database connection and returns the results.
        The results include data, metadata, and execution information.

        Rows returned are capped at PUBLISHER_MAX_QUERY_ROWS (default 100,000).
        The cap is forwarded to the connector as a rowLimit on RunSQLOptions;
        queries that return more rows than the cap fail with HTTP 413 rather
        than serializing the response. Set PUBLISHER_MAX_QUERY_ROWS=0 to
        disable the cap. A caller-supplied rowLimit smaller than the cap is
        preserved; larger values are clamped down to cap+1.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      requestBody:
        description: SQL statement to execute
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sqlStatement:
                  type: string
                options:
                  type: string
                  description: Options
      responses:
        "200":
          description: Query execution results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryData"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /environments/{environmentName}/connections/{connectionName}/sqlTemporaryTable:
    post:
      tags:
        - connections
      operationId: post-temporarytable
      summary: Create temporary table
      description: |
        Creates a temporary table from a SQL statement using the specified database connection.
        Temporary tables are useful for storing intermediate results during complex queries and data processing workflows.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: connectionName
          in: path
          description: Name of the connection
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      requestBody:
        description: SQL statement to create the temporary table
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sqlStatement:
                  type: string
      responses:
        "200":
          description: Temporary table information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemporaryTable"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # NOTE: The GET …/connections/{connectionName}/queryData endpoint
  # was removed alongside the operational-guards changes. Use the
  # POST …/sqlQuery endpoint above instead — it accepts the SQL in
  # the request body and obeys the row, byte, and timeout caps from
  # the OOM-mitigation work.

  # ──────────────────────────────────────────────────────────────────
  # Per-package connection data routes.
  #
  # `duckdb` is a per-package connection (each package has its own
  # `:memory:` DuckDB rooted at the package's path), so any data-plane
  # call against `connectionName="duckdb"` needs a package context.
  # Non-`duckdb` names resolve through the package's MalloyConfig
  # wrapper, which delegates to the environment's connection registry, so
  # the same routes also work for environment-level connections looked up
  # in a package context.
  # ──────────────────────────────────────────────────────────────────

  /environments/{environmentName}/packages/{packageName}/connections/{connectionName}/schemas:
    get:
      tags:
        - connections
      operationId: list-schemas-in-package
      summary: List database schemas (per-package)
      description: |
        Retrieves a list of all schemas (databases) available in the specified
        connection, resolved in the context of the named package. Required for
        `connectionName="duckdb"`, which is per-package; works for any other
        connection name as well (resolution falls through to the environment).
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package whose connection context to use
          required: true
          schema:
