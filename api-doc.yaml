        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /environments/{environmentName}/packages/{packageName}/notebooks/{path}/cells/{cellIndex}:
    get:
      tags:
        - notebooks
      operationId: execute-notebook-cell
      summary: Execute a specific notebook cell
      description: |
        Executes a specific cell in a Malloy notebook by index. For code cells, this compiles
        and runs the Malloy code, returning query results and any new sources defined.
        For markdown cells, this simply returns the cell content.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            type: string
        - name: path
          in: path
          description: Path to notebook within the package
          required: true
          schema:
            type: string
        - name: cellIndex
          in: path
          description: Index of the cell to execute (0-based)
          required: true
          schema:
            type: integer
        - name: versionId
          in: query
          description: Version identifier for the package
          required: false
          schema:
            $ref: "#/components/schemas/VersionIdPattern"
        - name: filter_params
          in: query
          deprecated: true
          description: |
            **DEPRECATED**: Use `givens` (native Malloy runtime parameters) instead.
            Targets the deprecated `#(filter)` annotation path. See docs/givens.md
            for migration recipes.

            JSON-encoded filter parameter values keyed by filter name.
          required: false
          schema:
            type: string
        - name: bypass_filters
          in: query
          deprecated: true
          description: |
            **DEPRECATED**: Use `givens` (native Malloy runtime parameters) instead.
            See docs/givens.md for migration recipes.

            When true, skip filter injection entirely.
          required: false
          schema:
            type: string
            enum:
              - "true"
              - "false"
        - name: givens
          in: query
          description: JSON-encoded given values keyed by given name
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Cell execution result
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/NotebookCellResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /environments/{environmentName}/packages/{packageName}/databases:
    get:
      tags:
        - databases
      operationId: list-databases
      summary: List embedded databases
      description: |
        Retrieves a list of all embedded databases within the specified package. These are typically
        DuckDB databases stored as .parquet files that provide local data storage for the package.
        Each database entry includes metadata about the database structure and content.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: versionId
          in: query
          description: Version identifier for the package
          required: false
          schema:
            $ref: "#/components/schemas/VersionIdPattern"
      responses:
        "200":
          description: A list of embedded databases in the package
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Database"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/packages/{packageName}/pages:
    get:
      tags:
        - pages
      operationId: list-pages
      summary: List package pages
      description: |
        Retrieves a list of all static HTML pages (in-package data apps) within
        the specified package. Each page entry includes the relative path, the
        package name, a canonical resource URL, and the page title (extracted
        from the file's <title> tag, falling back to the path). Used by the
        Publisher SPA to surface a clickable "Pages" section on the package
        detail view, and by anyone who wants to discover in-package data apps
        programmatically without scraping the directory. Recursive depth is
        capped server-side to keep this cheap on large packages.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      responses:
        "200":
          description: A list of pages in the package
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Page"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/packages/{packageName}/events:
    get:
      tags:
        - watch-mode
      operationId: stream-package-events
      summary: Stream package change events (SSE)
      description: |
        Opens a Server-Sent Events (SSE) stream of file-change events for the
        package, used by in-package HTML data apps (via the publisher.js
        runtime) to live-reload when their sources are edited.

        This is a long-lived `text/event-stream` connection, not a JSON
        endpoint, and is therefore not surfaced through the generated API
        clients — consume it with an `EventSource`. The stream emits:
          - `event: hello` (`data: connected`) once on connect.
          - `event: mode` (`data: enabled|disabled`) reporting whether watch
            mode is currently active for the environment. When `disabled`, no
            `changed` events will follow until watch mode is started.
          - `event: changed` (`data: changed`) each time a watched file in the
            package changes.
          - periodic `: heartbeat` comments to keep idle proxies from closing
            the connection.
      parameters:
        - name: environmentName
          in: path
          description: Name of the environment
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
        - name: packageName
          in: path
          description: Name of the package
          required: true
          schema:
            $ref: "#/components/schemas/IdentifierPattern"
      responses:
        "200":
          description: An open Server-Sent Events stream of change events
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE event stream (see endpoint description for event types)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /connections/test:
    post:
      tags:
        - connectionsTest
      operationId: test-connection-configuration
      summary: Test database connection configuration
      description: |
        Validates a database connection configuration without adding it to any environment.
        This endpoint allows you to test connection parameters, credentials, and network
        connectivity before committing the connection to an environment. Useful for troubleshooting
        connection issues and validating configurations during setup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Connection"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /watch-mode/status:
    get:
      tags:
        - watch-mode
      operationId: get-watch-status
      summary: Get watch mode status
      description: |
        Retrieves the current status of the file watching system. This includes whether watch mode
        is enabled, which environment is being watched, and the path being monitored. Useful for
        monitoring the development workflow and ensuring file changes are being detected.
      responses:
        "200":
          description: The current watch mode status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /watch-mode/start:
    post:
      tags:
        - watch-mode
      operationId: start-watching
      summary: Start file watching
      description: |
        Initiates file watching for the specified environment. This enables real-time monitoring of
        file changes within the environment directory, allowing for automatic reloading and updates
        during development. Only one environment can be watched at a time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartWatchRequest"
      responses:
        "200":
          description: Watch mode started successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /watch-mode/stop:
    post:
      tags:
        - watch-mode
      operationId: stop-watching
      summary: Stop file watching
      description: |
        Stops the current file watching session. This disables real-time monitoring of file changes
        and releases system resources. Use this when development is complete or when switching
        to a different environment.
      responses:
        "200":
          description: Watch mode stopped successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /environments/{environmentName}/packages/materializations:
    get:
      tags:
        - materializations
      operationId: list-environment-materializations
      summary: List all materializations in an environment
      description:
        Returns every materialization across all packages in the environment,
        ordered by most recent first. Each item carries its `packageName`, so an
        environment-scoped view can group or label by package. This is the
        collection-level sibling of the per-package
        `/packages/{packageName}/materializations` list; the literal
        `materializations` segment is matched ahead of `{packageName}`, so
        `materializations` cannot be used as a package name.
      parameters:
        - $ref: "#/components/parameters/environmentName"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of materializations to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Number of materializations to skip
      responses:
        "200":
          description: List of materializations across the environment
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Materialization"
        "404":
          $ref: "#/components/responses/NotFound"

  /environments/{environmentName}/packages/{packageName}/materializations:
    post:
      tags:
        - materializations
      operationId: create-materialization
      summary: Create a materialization
      description: |
        Creates a materialization and starts building. Behavior depends on the request
        body (see CreateMaterializationRequest):
          * Orchestrated build — supply `buildInstructions`. The publisher builds directly
            into the caller-assigned names derived from the package's already-compiled build
            plan (read off `Package.buildPlan`). Returns the materialization already building.
          * Auto-run (standalone, default) — omit `buildInstructions`; the publisher
            self-assigns names and runs all phases in one pass.
      parameters:
        - $ref: "#/components/parameters/environmentName"
        - $ref: "#/components/parameters/packageName"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterializationRequest"
      responses:
        "201":
          description: Materialization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Materialization"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Package already has an active materialization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - materializations
      operationId: list-materializations
      summary: List materializations for a package
      description:
        Returns the materialization history for the package, ordered by
        most recent first.
      parameters:
        - $ref: "#/components/parameters/environmentName"
        - $ref: "#/components/parameters/packageName"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of materializations to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Number of materializations to skip
      responses:
        "200":
          description: List of materializations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Materialization"
        "404":
          $ref: "#/components/responses/NotFound"

  /environments/{environmentName}/packages/{packageName}/materializations/{materializationId}:
    get:
      tags:
        - materializations
      operationId: get-materialization
      summary: Get a specific materialization
      parameters:
        - $ref: "#/components/parameters/environmentName"
        - $ref: "#/components/parameters/packageName"
        - $ref: "#/components/parameters/materializationId"
      responses:
        "200":
          description: Materialization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Materialization"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - materializations
      operationId: materialization-action
      summary: Perform an action on a materialization
      description: |
        Performs an action on a materialization. The action is specified via
        the `action` query parameter:
          * `stop` - Cancels a PENDING or building materialization. Returns 200.
      parameters:
        - $ref: "#/components/parameters/environmentName"
        - $ref: "#/components/parameters/packageName"
        - $ref: "#/components/parameters/materializationId"
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - stop
          description: Action to perform on the materialization
      responses:
        "200":
          description: Materialization cancelled (action=stop)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Materialization"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Materialization cannot transition to the requested state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - materializations
      operationId: delete-materialization
      summary: Delete a materialization
      description: |
        Deletes a terminal (MANIFEST_FILE_READY, FAILED, or CANCELLED)
        materialization record. By default this removes the publisher's record
        only; the caller owns table GC. Set dropTables=true to also drop
        the physical tables this run produced (from the materialization's
        manifest) as a best-effort cleanup.
      parameters:
        - $ref: "#/components/parameters/environmentName"
        - $ref: "#/components/parameters/packageName"
        - $ref: "#/components/parameters/materializationId"
        - name: dropTables
          in: query
          required: false
          description: |
            When true, also drop the physical tables recorded in the
            materialization's manifest before deleting the record. Defaults to
            false (record-only delete; the caller owns table GC).
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: Materialization deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Materialization cannot be deleted while it is active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  responses:
    BadRequest:
      description:
        The request was malformed or cannot be performed given the current
        state of the system
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden - insufficient permissions to perform the operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: The server encountered an internal error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotImplemented:
      description: The requested operation is not implemented
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ModelCompilationError:
      description: Model compilation failed due to syntax or semantic errors
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: |
        The service is temporarily unable to accept the request. Possible
        causes:
          * Initialization or draining state (rolling updates, graceful
            shutdown).
          * Memory back-pressure — the publisher's RSS crossed the
            high-water mark derived from PUBLISHER_MAX_MEMORY_BYTES and
            PUBLISHER_MEMORY_HIGH_WATER_FRACTION, so new queries are
            rejected until RSS drops below the low-water mark
            (PUBLISHER_MEMORY_LOW_WATER_FRACTION).
          * Per-pod query concurrency cap reached — PUBLISHER_MAX_CONCURRENT_QUERIES
            in-flight queries are already running on this pod.
        Clients should retry with backoff; under sustained pressure, scale
        out, raise PUBLISHER_MAX_MEMORY_BYTES / PUBLISHER_MAX_CONCURRENT_QUERIES,
        or refine the offending queries.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PayloadTooLarge:
      description: |
        The request was well-formed but the response exceeds a server-side
        size cap. Two caps can fire:
          * PUBLISHER_MAX_QUERY_ROWS (default 100000) — too many rows.
          * PUBLISHER_MAX_RESPONSE_BYTES (default 50 MB) — JSON-serialized
            response too large.
        The error message identifies which cap fired. Refine the query (add
        a LIMIT, more selective WHERE, project fewer columns) or raise the
        relevant cap; retrying without changes will not succeed. The
        per-cap rejection counter is exported as
        publisher_query_cap_exceeded_total{cap_type, source}.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    GatewayTimeout:
      description: |
        The query exceeded the per-request wall-clock budget
        (PUBLISHER_QUERY_TIMEOUT_MS) and was aborted server-side.
        Refine the query (add a more selective WHERE, lower LIMIT,
        simplify joins) or raise the timeout. Retrying without
        changes is unlikely to succeed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    IdentifierPattern:
      type: string
      pattern: "^[a-zA-Z0-9_-]+$"
      description: Standard identifier pattern for resource names

    VersionIdPattern:
      type: string
      pattern: "^[a-zA-Z0-9_.-]+$"
      description: Version identifier pattern supporting dots and dashes

    PathPattern:
      type: string
      pattern: "^[a-zA-Z0-9_/.-]+$"
      description: Path pattern supporting slashes, dots, and dashes

    ServerStatus:
      type: object
      description: Current server status and health information
      properties:
        timestamp:
          type: number
          description: Unix timestamp of the status check
        environments:
          type: array
          description: List of available environments
          items:
            $ref: "#/components/schemas/Environment"
        initialized:
          type: boolean
          description: Whether the server is fully initialized and ready to serve requests
        operationalState:
          type: string
          enum: ["initializing", "serving", "draining", "throttled"]
          description:
            Status of the server; initializing when the server is loading
            environments, packages and connections, serving when the server is
            initialized and ready to serve requests, draining when the
            server is going to shut down, and throttled when the server has hit
            its memory back-pressure limit and is rejecting new package loads and
            queries to stay under PUBLISHER_MAX_MEMORY_BYTES (see the memory
            governor). Already-loaded packages remain serviceable while throttled;
            callers can treat a throttled server as unhealthy for new load.
            Only reported when the memory governor is enabled.
        loadErrors:
          type: array
          readOnly: true
          description:
            Configured packages and environments that did not load, and why. A
            load failure is not fatal to the server, so operationalState stays
            serving and the affected packages are simply absent from
            environments; this is the only place that difference is reported, so
            check it before treating a serving server as complete. Present only
            when something failed to load, so a healthy server omits the field.
          items:
            type: object
            properties:
              environment:
                type: string
                description:
                  Name of the configured environment the failure belongs to.
              package:
                type: string
                description:
                  Name of the configured package that did not load. Absent when
                  the whole environment was skipped, which is what happens when a
                  package location cannot be mounted at all; in that case no
                  package in the environment loads, including ones that would
                  otherwise have succeeded.
              message:
                type: string
                description: Why it did not load.
        frozenConfig:
          type: boolean
          description:
            Whether the server configuration is frozen (read-only mode). When
            true, all mutation operations are disabled.
        theme:
          $ref: "#/components/schemas/Theme"
          description: Instance-wide default theme for the Malloy renderer and the
            Publisher app shell.

    Theme:
      type: object
      description: Visual theme applied to Malloy renderer output (chart palette,
        fonts, table chrome) and to the Publisher app shell. Cascade order is
        instance → per-chart Malloy annotation, with later layers overriding
        earlier ones for the keys they set. (A per-environment layer is reserved
        but not yet applied by the client.)
      properties:
        defaultMode:
          type: string
          enum: [ "light", "dark", "auto" ]
          description: Initial color mode for new viewers. "auto" follows the
            browser's prefers-color-scheme until the viewer overrides.
        allowUserToggle:
          type: boolean
          description: When true, the Publisher app renders a light/dark toggle and
            persists the viewer's choice to localStorage. When false, the
            defaultMode is enforced.
        palette:
          type: object
          description: Color tokens consumed by the Malloy renderer and the app shell.
          properties:
            series:
              type: array
              description: Ordered list of hex colors used by multi-series charts
                (passed to Vega's `range.category`). Shared across light
                and dark modes so the brand palette stays consistent
                when viewers switch modes.
              items:
                type: string
            background:
              type: object
              description: Page and chart background per mode.
              properties:
                light:
                  type: string
                dark:
                  type: string
            tableHeader:
              type: object
              description: Foreground color for the table header per mode.
              properties:
                light:
                  type: string
                dark:
                  type: string
            tableHeaderBackground:
              type: object
              description: Background color for the table header row, per mode.
                Distinct from `tile` (the dashboard tile container that wraps
                each chart / table) so operators can theme the header band
                independently from the padding around the table.
              properties:
                light:
                  type: string
                dark:
                  type: string
            tableBody:
              type: object
              description: Foreground color for table body cells per mode.
              properties:
                light:
                  type: string
                dark:
                  type: string
            tile:
              type: object
              description: Background color of the dashboard tile (the padded
                container that wraps each chart / table) per mode.
              properties:
                light:
                  type: string
                dark:
                  type: string
            tileTitle:
              type: object
              description: Foreground color for the title text that sits in the
                dashboard tile padding (e.g. the "by_month" label above a
                chart) per mode.
              properties:
                light:
                  type: string
                dark:
                  type: string
            mapColor:
              type: object
              description: Saturated end of the gradient used by choropleth maps
                and other sequential color scales. The renderer pairs it
                with a near-neutral low end so the operator only picks
                the brand-saturated colour.
              properties:
                light:
                  type: string
                dark:
                  type: string
        font:
          type: object
          description: Typography overrides applied to both the app shell and the
            Malloy renderer (Vega text marks). Shared across light and
            dark modes because font choice is a brand decision, not a
            mode-specific one.
          properties:
            family:
              type: string
              description: CSS font-family stack.
            size:
              type: number
              description: Base font size in pixels for renderer text.

    Environment:
      type: object
      description:
        Represents a Malloy environment containing packages, connections,
        and other resources
      properties:
        resource:
          type: string
          description: Resource path to the environment
        name:
          type: string
          description: Environment name
        readme:
          type: string
          description: Environment README content
        location:
          type: string
          description:
            Environment location, can be an absolute path or URI (e.g. github,
            s3, gcs, etc.)
        connections:
          type: array
          description: List of database connections configured for this environment
          items:
            $ref: "#/components/schemas/Connection"
        packages:
          type: array
          description: List of Malloy packages in this environment
          items:
            $ref: "#/components/schemas/Package"
        theme:
          $ref: "#/components/schemas/Theme"
          description: Reserved for a per-environment theme override. Not yet
            populated by the server or applied by the client; viewers currently
            use the instance-level theme only.

    Package:
      type: object
      description: Represents a Malloy package containing models, notebooks, and
        embedded databases
      properties:
        resource:
          type: string
          description: Resource path to the package
        name:
          type: string
          description: Package name
        description:
          type: string
          description: Package description
        location:
          type: string
          description:
            Package location, can be an absolute path or URI (e.g. github, s3,
            gcs, etc.)
        scope:
          type: string
          enum:
            - version
            - package
          default: package
          description: >-
            Package-level Malloy Persistence scope mode, declared once at the
            malloy-publisher.json root and applied uniformly to every persist
            source and index in the package. `package` (the default) =
            persisted artifacts are package-scoped: reused across the package's
            published versions whenever they still satisfy freshness. `version`
            = version-scoped: each artifact is owned by one published version.
            There is no per-source/per-dimension scope. A
            `materialization.schedule` cron is legal only when `scope: version`
            (a package-scoped lineage is reused across versions, so a single
            per-version cadence is meaningless). Emitted whenever the package is
            loaded; defaults to `package` when the manifest omits it.
        explores:
          type: array
          items:
            type: string
          description: >-
            Optional opt-in for curated discovery. When present, only these
            model file paths (relative to the package root) are listed via
            `listModels()`, and within-file discovery is filtered to each
            model's `export {}` closure. When absent or empty, every model is
            listed with its full source set (backward-compatible). Every other
            .malloy file still compiles for import/join resolution but is
            hidden from listings once `explores` is declared. Notebooks are
            always listed regardless of this field.
        exploresWarnings:
          type: array
          readOnly: true
          items:
            type: string
          description: >-
            Actionable messages for declared explores that do not resolve to
            a real model in this package (e.g. a misspelled path, or a notebook
            listed as an explore). Server-computed and read-only: it is
            ignored on create/update requests and only ever returned in
            responses. Present only when there are such problems. Loading is
            fail-safe — the unresolved entry simply lists nothing rather than
            exposing everything — so this is the signal that a package is
            misconfigured; publishing such a package is rejected.
        warnings:
          type: array
          readOnly: true
          description: >-
            Non-fatal render-tag findings collected when the package loaded: a
            render annotation (e.g. `# big_value` or `# currency`) misconfigured
            for the field it sits on, so it renders as "[object Object]" or an
            inline error at query time but does not stop the model compiling or
            the package loading. Server-computed and read-only: ignored on
            create/update requests and only returned in responses. Present only
            when there are such findings.
          items:
            type: object
            properties:
              model:
                type: string
                description: >-
                  Package-relative path of the model the finding is on.
              target:
                type: string
                description: >-
                  The query or view the finding sits on, e.g. `by_carrier` or
                  `flights -> by_carrier`.
              message:
                type: string
                description: The render validator's description of the problem.
              severity:
                type: string
                enum:
                  - error
                  - warn
                description: >-
                  Finding severity. Currently only `error`-severity render
                  findings are surfaced here; lower-severity findings remain on
                  the query-time `renderLogs` surface.
        queryableSources:
          type: string
          enum:
            - declared
            - all
          description: >-
            Controls whether the discovery surface is also a query boundary.
            `"declared"` (the default) makes queryable == discoverable: when
            `explores` is declared, only `explores` model files — and within
            them only the `export {}` closure — are valid top-level query
            targets; every other source still compiles, imports, joins, and
            extends but is not directly queryable (denied with 404). `"all"`
            decouples them: `explores`/`export {}` gate discovery only and every
            compiled source stays directly queryable. When `explores` is absent
            there is no curated surface, so both modes are equivalent
            (everything queryable). Invalid values fall back to `"declared"`.
            Identity-based access is a separate concern — see `#(authorize)`.
        manifestLocation:
          type: ["string", "null"]
          description: |
            URI (gs:// or s3://) of the externally-computed manifest for this package.
            On (re)load the publisher reads it and binds persist references
            (sourceEntityId -> physicalTableName). Null = serve live.
        materialization:
          oneOf:
            - $ref: "#/components/schemas/PackageMaterializationConfig"
            - type: "null"
          description: |
            Package-level Malloy Persistence policy declared in
            malloy-publisher.json. The control plane reads it to drive scheduled
            re-materialization. The object is present whenever the package has
            loaded — with `schedule: null` when the manifest declares no
            schedule — so the caller can treat object-present as the
            authoritative manifest policy. Null/absent only when package
            metadata is unavailable for this request (not loaded), which the
            caller must treat as "unknown", not as a removal.
        manifestBindingStatus:
          type: string
          readOnly: true
          enum:
            - unbound
            - bound
            - live_fallback
          description: >-
            Server-computed, read-only: whether the configured build manifest
            is currently bound to this package's served models. `unbound` = no
            manifest configured, so the package serves live. `bound` = a manifest
            was fetched and applied, so persist sources route to their
            materialized physical tables. `live_fallback` = a `manifestLocation`
            is configured but the fetch/bind failed or timed out, so the package
            is serving live despite intending to be materialized-routed. Lets the
            caller confirm the publisher actually bound the configured manifest
            rather than inferring it from logs.
        manifestEntryCount:
          type: integer
          readOnly: true
          description: >-
            Server-computed, read-only: number of sourceEntityId -> physical-table
            entries currently bound (0 when unbound or on live fallback).
        boundManifestUri:
          type: ["string", "null"]
          readOnly: true
          description: >-
            Server-computed, read-only: the manifest URI actually bound to the
            served models. Usually equals `manifestLocation`, but can differ
            after an in-memory auto-load following a materialization build (no
            URI), in which case it is null. Null whenever the package is unbound.
        buildPlan:
          oneOf:
            - $ref: "#/components/schemas/BuildPlan"
            - type: "null"
          readOnly: true
          description: >-
            Server-computed, read-only: the persist build plan for this package
            version (per-source sourceEntityId, output columns, build SQL,
            dependency graphs), exposed as a deterministic property of the
            compiled package.
            A caller reads it directly off the load/get-package response, assigns
            physical names/identity per source, and issues a single build call
            (see `CreateMaterializationRequest.buildInstructions`) — no separate
            plan round-trip. The plan is a pure function of the compiled model +
            connection config (no warehouse access), so it is stable for a given
            (package version, connection config). Returned by default whenever the
            package is compiled; null only when the package declares no persist
            source.

    PackageMaterializationConfig:
      type: object
      description: >-
        Package-level Malloy Persistence policy from malloy-publisher.json's
        `materialization` block. Surfaced verbatim so the control plane can drive
        scheduled version-level re-materialization without re-reading the package
        files. The object is emitted whenever the package is loaded, even when no
        policy is declared (all fields null), so its presence is an authoritative
        "the manifest says this" signal rather than "policy missing".
      properties:
        schedule:
          type: ["string", "null"]
          description: >-
            5-field UNIX cron controlling how often the control plane
            re-materializes this package's published versions. Null = no
            scheduled re-materialization declared in the manifest (publish /
            on-demand only). A cron is the power tier of artifact-anchored
            scheduling and is package-root-only: it is valid only when the
            package declares `scope: version` (a package-scoped lineage is
            reused across versions, so a single per-version cadence is
            meaningless), and it is mutually exclusive with freshness — declare
            either a `schedule` (power tier) or `freshness` (objective tier),
            never both. A schedule on a `scope: package` package, or alongside
            any freshness, is rejected at publish.
        freshness:
          oneOf:
            - $ref: "#/components/schemas/Freshness"
            - type: "null"
          description: >-
            The manifest's `materialization.freshness` block, verbatim. Null =
            no freshness policy declared. `window` is the control plane's
            refresh objective for the package's materialized sources;
            `fallback` is the declared query-time behavior when the objective
            is missed. The publisher only surfaces the values — the control
            plane owns the scheduling and gating logic.

    Freshness:
      type: object
      description: >-
        Freshness policy declared in malloy-publisher.json's
        `materialization.freshness` block. Fields are surfaced verbatim;
        invalid values are dropped (reported as absent), never defaulted.
      properties:
        window:
          type: string
          description: >-
            Maximum acceptable staleness of the package's materialized
            sources, as a duration string (e.g. "24h"). The control plane
            schedules refreshes to meet it.
        fallback:
          type: string
          enum: [live, stale_ok, fail]
          description: >-
            Declared query-time behavior when the freshness window is missed:
            serve live, serve the stale table, or fail the query.

    Model:
      type: object
      description: Malloy model metadata and status information
      properties:
        resource:
          type: string
          description: Resource path to the model
        packageName:
          type: string
          description: Name of the package containing this model
        path:
          type: string
          description: Relative path to the model file within its package directory
        error:
          type: string
          description: Error message if the model failed to compile or load

    Notebook:
      type: object
      description: Malloy notebook metadata and status information
      properties:
        resource:
          type: string
          description: Resource path to the notebook
        packageName:
          type: string
          description: Name of the package containing this notebook
        path:
          type: string
          description: Relative path to the notebook file within its package directory
        error:
          type: string
          description: Error message if the notebook failed to compile or load

    Page:
      type: object
      description: Static HTML page (in-package data app) within a Malloy package
      properties:
        resource:
          type: string
          description:
            Canonical URL to the served page. Root-relative and does NOT
            carry the /api/v0 prefix, because pages are static assets served off
            the server root rather than API resources.
        packageName:
          type: string
          description: Name of the package containing this page
        path:
          type: string
          description: Relative path to the HTML file within its package directory
        title:
          type: string
          description:
            Title extracted from the file's <title> tag, or the path if
            not present
        fit:
          type: string
          enum:
            - viewport
          description:
            Layout hint read from a <meta name="publisher:fit"> tag in the
            page <head>. "viewport" tells the embedded page viewer to fill the
            available height instead of auto-sizing to the page's content
            height, for full-screen apps like slide decks. Omitted for ordinary
            content pages, which keep content-height auto-sizing.

    RawNotebook:
      type: object
      description: Raw Malloy notebook with unexecuted cell contents
      properties:
        resource:
          type: string
          description: Resource path to the notebook
        packageName:
          type: string
          description: Name of the package containing this notebook
        path:
          type: string
          description: Relative path to the notebook file within its package directory
        malloyVersion:
          type: string
          description: Version of the Malloy compiler used to generate the notebook data
        notebookCells:
          type: array
          description: Array of notebook cells containing raw markdown and code content
          items:
            $ref: "#/components/schemas/NotebookCell"
        annotations:
          type: array
          description: Array of file-level (##) annotations attached to the notebook
          items:
            type: string
        sources:
          type: array
          description: Sources defined in the notebook's model
          items:
            $ref: "#/components/schemas/Source"

    CompiledModel:
      type: object
      description: Compiled Malloy model with sources, queries, and metadata
      properties:
        resource:
          type: string
          description: Resource path to the model
        packageName:
          type: string
          description: Name of the package containing this model
        path:
          type: string
          description: Relative path to the model file within its package directory
        malloyVersion:
          type: string
          description: Version of the Malloy compiler used to generate the model data
        modelInfo:
          type: string
          description: JSON string containing model metadata and structure information
        sourceInfos:
          type: array
          description:
            Array of JSON strings containing source information for each data
            source
          items:
            type: string
        queries:
          type: array
          description: Array of named queries defined in the model
          items:
            $ref: "#/components/schemas/Query"
        sources:
          type: array
          description: Sources defined in this model
          items:
            $ref: "#/components/schemas/Source"
        givens:
          type: array
          description:
            Givens (runtime parameters) declared on this model via the
            `given:` keyword
          items:
            $ref: "#/components/schemas/Given"

    View:
      type: object
      description: Named model view definition
      properties:
        name:
          type: string
          description: Name of the view
        annotations:
          type: array
          description: Annotations attached to the view
          items:
            type: string

    Query:
      type: object
      description: Named model query definition
      properties:
        name:
          type: string
          description: Name of the query
        sourceName:
          type: string
          description: Name of the source this query operates on
        annotations:
          type: array
          description: Annotations attached to the query
          items:
            type: string

    Filter:
      type: object
      deprecated: true
      description: |
        **DEPRECATED**: Use the `Given` schema (native Malloy runtime parameters)
        instead. See docs/givens.md for migration recipes.

        A filter declared via #(filter) annotation on a Malloy source.
      properties:
        name:
          type: string
          description: Display name of the filter
        dimension:
          type: string
          description: Dimension this filter targets
        type:
          type: string
          description: Comparator type
          enum:
            - equal
            - in
            - like
            - greater_than
            - less_than
        implicit:
          type: boolean
          description: Whether this filter is hidden from users
        required:
          type: boolean
          description: Whether a value must be provided
        dimensionType:
          type: string
          description:
            Malloy data type of the dimension (e.g. string, number, boolean,
            date, timestamp)

    Given:
      type: object
      description:
        A given (runtime parameter) declared on a Malloy model via the
        `given:` keyword. Surfaced on `CompiledModel.givens` and `Source.givens`
        so callers can introspect what runtime values a model accepts.
      properties:
        name:
          type: string
          description: Name as declared in the model
        type:
          type: string
          description: Rendered Malloy type for the given (e.g. string, number,
            boolean, date, timestamp, filter<string>)
        annotations:
          type: array
          description: Annotations attached to the given declaration
          items:
            type: string
        default:
          type: string
          description: The given's default value as a Malloy source literal
            (e.g. `'WN'`, `2003`, `@2024-01-01`, `f'WN'`), exactly as written in
            the model. Omitted when the given declares no default. Consumers
            render or prefill it per the given's `type` (e.g. unquote a string
            literal for a text input).

    Givens:
      type: object
      description: Per-query given values that override model defaults. Keys are
        given names declared in the model's `given:` block. Values must match
        the declared type (string, number, boolean, date, etc.). See Malloy
        givens documentation for accepted value shapes.
      additionalProperties: true

    Source:
      type: object
      description: A Malloy source defined in a model
      properties:
        name:
          type: string
          description: Name of the source
        annotations:
          type: array
          description: Annotations attached to the source
          items:
            type: string
        views:
          type: array
          description: Views defined in this source
          items:
            $ref: "#/components/schemas/View"
        filters:
          type: array
          description: Filters declared on this source via #(filter) annotations
          items:
            $ref: "#/components/schemas/Filter"
        givens:
          type: array
          description:
            Model-level givens (runtime parameters) available to queries
            on this source. Identical to `CompiledModel.givens`; repeated here
            for SDK ergonomics so consumers iterating sources can render inputs
            without a second lookup.
          items:
            $ref: "#/components/schemas/Given"
        authorize:
          type: array
          description: >-
            Effective authorize expressions declared on this source via
            `#(authorize)` / `##(authorize)` annotations — file-level expressions
            first, then the source's own. Each is a Malloy boolean expression over
            declared givens, evaluated as a disjunction (OR) and enforced at query
            time. A request that reads this source is denied with HTTP 403 unless
            at least one expression evaluates true for the supplied givens; an
            empty or absent list means unrestricted. Givens are caller-asserted, so
            this is a boundary only behind a trusted tier — see docs/authorize.md.
          items:
            type: string

    QueryRequest:
      type: object
      description: Request body for executing a Malloy query
      properties:
        query:
          type: string
          description:
            Query string to execute on the model. If the query parameter is
            set, the queryName parameter must be empty.
        sourceName:
          type: string
          description:
            Name of the source in the model to use for queryName, search, and
            topValue requests.
        queryName:
          type: string
          description:
            Name of a query to execute on a source in the model. Requires the
            sourceName parameter is set. If the queryName parameter is set, the
            query parameter must be empty.
        compactJson:
          type: boolean
          default: false
          description:
            'If true, returns a simple JSON array of row objects in the form
            {"columnName": value}. If false (default), returns the full Malloy
            result with type metadata for rendering.'
        versionId:
          type: string
          description: Version ID
        filterParams:
          type: object
          deprecated: true
          description: |
            **DEPRECATED**: Use `givens` (native Malloy runtime parameters) instead.
            Targets the deprecated `#(filter)` annotation path. See docs/givens.md
            for migration recipes.

            Filter parameter values keyed by filter name. Used with sources that
            declare `#(filter)` annotations. Each value is either a string or an
            array of strings.
          additionalProperties: true
        bypassFilters:
          type: boolean
          default: false
          deprecated: true
          description: |
            **DEPRECATED**: Use `givens` (native Malloy runtime parameters) instead.
            See docs/givens.md for migration recipes.

            When true, skip server-side `#(filter)` injection entirely.
        givens:
          $ref: "#/components/schemas/Givens"

    NotebookCell:
      type: object
      description: Individual cell within a Malloy notebook
      properties:
        type:
          type: string
          enum: ["markdown", "code"]
          description: Type of notebook cell
        text:
          type: string
          description: Text contents of the notebook cell (either markdown or Malloy code)
        newSources:
          type: array
          description:
            Array of JSON strings containing SourceInfo objects made available
            in this cell
          items:
            type: string
        queryInfo:
          type: string
          description:
            JSON string containing QueryInfo object for the query in this cell
            (if the cell contains a query)

    NotebookCellResult:
      type: object
      description: Result of executing a notebook cell
      properties:
        type:
          type: string
          enum: ["markdown", "code"]
          description: Type of notebook cell
        text:
          type: string
          description: Text contents of the notebook cell
        result:
          type: string
          description: JSON string containing the execution result for this cell
        newSources:
          type: array
          description:
            Array of JSON strings containing SourceInfo objects made available
            in this cell
          items:
            type: string

    QueryResult:
      type: object
      description: Results from executing a Malloy query
      properties:
        result:
          type: string
          description:
            JSON string containing the query results, metadata, and execution
            information
        resource:
          type: string
          description: Resource path to the query result
        renderLogs:
          type: array
          description:
            Render tag validation messages (errors, warnings) detected during
            query preparation
          items:
            $ref: "#/components/schemas/LogMessage"

    LogMessage:
      type: object
      description: A log message from render tag validation
      properties:
        url:
          type: string
          description: URL of the source file related to this message
        range:
          type: object
          description: Source location range for this message
          properties:
            start:
              type: object
              properties:
                line:
                  type: integer
                character:
                  type: integer
            end:
              type: object
              properties:
                line:
                  type: integer
                character:
                  type: integer
        severity:
          type: string
          description: Severity level of the log message
          enum: ["debug", "info", "warn", "error"]
        message:
          type: string
          description: Human-readable log message

    Database:
      type: object
      description: Embedded database within a Malloy package
      properties:
        resource:
          type: string
          description: Resource path to the database
        path:
          type: string
          description: Relative path to the database file within its package directory
        info:
          $ref: "#/components/schemas/TableDescription"
        type:
          type: string
          description: Type of embedded database
          enum: ["embedded", "materialized"]

    Schema:
      description: A schema name in a Connection.
      type: object
      properties:
        name:
          type: string
          description: Name of the schema
        description:
          type: string
          description: Description of the schema
        isDefault:
          type: boolean
          description: Whether this schema is the default schema
        isHidden:
          type: boolean
          description: Whether this schema is hidden

    Connection:
      type: object
      description: Database connection configuration and metadata
      properties:
        resource:
          type: string
          description: Resource path to the connection
        name:
          type: string
          description: Name of the connection
        type:
          type: string
          description: Type of database connection
          enum:
            [
              postgres,
              bigquery,
              snowflake,
              trino,
              databricks,
              mysql,
              duckdb,
              motherduck,
              ducklake,
              publisher,
            ]
        fingerprint:
          type: string
          description: >
            Optional, opaque, stable fingerprint of this connection's data
            identity. It is a hash of the configuration that determines *which
            data* the connection reaches (its data-locating settings), and
            deliberately excludes credentials and other secret values, so it
            stays constant across credential rotation and changes only when the
            connection is pointed at different data. When present, it is used as
            this connection's contribution to content-addressed build identifiers
            so that builds re-address only when the underlying data identity
            actually changes; consumers should treat it as an opaque token and
            use the supplied value verbatim rather than deriving their own. This
            field is optional — when omitted, a connection identity is derived
            locally instead.
        attributes:
          $ref: "#/components/schemas/ConnectionAttributes"
        proxy:
          $ref: "#/components/schemas/ConnectionProxy"
        postgresConnection:
          $ref: "#/components/schemas/PostgresConnection"
        bigqueryConnection:
          $ref: "#/components/schemas/BigqueryConnection"
        snowflakeConnection:
          $ref: "#/components/schemas/SnowflakeConnection"
        trinoConnection:
          $ref: "#/components/schemas/TrinoConnection"
        databricksConnection:
          $ref: "#/components/schemas/DatabricksConnection"
        mysqlConnection:
          $ref: "#/components/schemas/MysqlConnection"
        duckdbConnection:
          $ref: "#/components/schemas/DuckdbConnection"
        motherduckConnection:
          $ref: "#/components/schemas/MotherDuckConnection"
        ducklakeConnection:
          $ref: "#/components/schemas/DucklakeConnection"
        publisherConnection:
          $ref: "#/components/schemas/PublisherConnection"

    ConnectionProxy:
      type: object
      description:
        Optional network proxy through which the connection is reached. Applies to
        any connection type whose database is not directly reachable (e.g. behind a
        bastion). The proxy is established below the driver, so the driver connects
        to a local endpoint transparently. Modeled as a discriminated union on
        `type` so additional proxy mechanisms can be added later. The trust
        control is host-key pinning (fail-closed); a proxy is authorized by
        whoever configures the connection, not by an env-flag gate.
      required:
        - type
      properties:
        type:
          type: string
          enum: [ssh]
          description: Proxy mechanism. Currently only SSH local port-forwarding.
        ssh:
          $ref: "#/components/schemas/SshProxyConfig"

    SshProxyConfig:
      type: object
      description:
        SSH bastion / jump-host config for reaching a database inside a private
        network via an SSH local port-forward. Authentication is public-key only.
      required:
        - host
        - username
        - privateKey
      properties:
        host:
          type: string
          description: Bastion hostname or IP address (the SSH jump host)
        port:
          type: integer
          default: 22
          description: Bastion SSH port (defaults to 22)
        username:
          type: string
          description: SSH username on the bastion
        privateKey:
          type: string
          description:
            PEM-encoded SSH private key used to authenticate to the bastion. The
            customer authorizes the matching public key in the bastion's
            authorized_keys; public-key auth only.
        privateKeyPass:
          type: string
          description: Passphrase for the encrypted private key, if any.
        hostKey:
          type: string
          description: |
            Optional pinned bastion host public key(s), as one or more OpenSSH
            known_hosts lines (or bare base64 blobs), verified on every connect.
            List multiple lines to pin a load-balanced/HA bastion that presents a
            different key per backend — any listed key is accepted; a mismatch
            fails the connection closed. Plain and hashed (`|1|…`) lines both work
            — only the key blob is compared, never the hostname. When omitted, the
            tunnel connects without host-key verification (the self-service
            default); the SSH transport is still encrypted.

    ConnectionAttributes:
      type: object
      description: Connection capabilities and configuration attributes
      properties:
        dialectName:
          type: string
          description: SQL dialect name for the connection
        isPool:
          type: boolean
          description: Whether the connection uses connection pooling
        canPersist:
          type: boolean
          description: Whether the connection supports persistent storage operations
        canStream:
          type: boolean
          description: Whether the connection supports streaming query results

    PostgresConnection:
      type: object
      description: PostgreSQL database connection configuration
      properties:
        host:
          type: string
          description: PostgreSQL server hostname or IP address
        port:
          type: integer
          description: PostgreSQL server port number
        databaseName:
          type: string
          description: Name of the PostgreSQL database
        userName:
          type: string
          description: PostgreSQL username for authentication
        password:
          type: string
          description: PostgreSQL password for authentication
        connectionString:
          type: string
          description:
            Complete PostgreSQL connection string (alternative to individual
            parameters)
        sslmode:
          type: string
          enum: [disable, no-verify, verify-ca, verify-full]
          description:
            TLS mode for a connection reached through a `proxy` (SSH bastion).
            Because the driver connects to a local tunnel endpoint, the cert
            hostname can't be checked from the tunnel address alone; use
            `verify-full` to check it against the real host. `verify-ca`
            validates the server cert chain against the trusted CA bundle (e.g.
            the baked Amazon RDS roots) without the hostname, `verify-full`
            validates the chain AND the hostname against the real host (verified
            via SNI through the tunnel; requires the target's CA to be trusted by
            Node's bundled CA roots or NODE_EXTRA_CA_CERTS), `no-verify` encrypts without
            verifying, and `disable` uses no TLS. Note `verify-full` trusts a
            broader CA set than `verify-ca` here — ambient roots plus
            NODE_EXTRA_CA_CERTS, rather than the pinned NODE_EXTRA_CA_CERTS
            bundle that `verify-ca` uses — so it is intentionally not a strict
            superset; it adds the hostname check without narrowing CA trust.
            The server defaults it to
            `no-verify` when a proxy is set (so a force-SSL target isn't rejected
            for plaintext) — a server-applied default, not a schema default. Only
            valid on a proxied connection — a direct connection uses the
            deployment PGSSLMODE and rejects this field.

    MysqlConnection:
      type: object
      description: MySQL database connection configuration
      properties:
        host:
          type: string
          description: MySQL server hostname or IP address
        port:
          type: integer
          description: MySQL server port number
        database:
          type: string
          description: Name of the MySQL database
        user:
          type: string
          description: MySQL username for authentication
        password:
          type: string
          description: MySQL password for authentication

    GCSConnection:
      type: object
      description: Google Cloud Storage connection configuration for DuckDB
      properties:
        keyId:
          type: string
          description: GCS HMAC access key ID
        secret:
          type: string
          description: GCS HMAC secret key
      required:
        - keyId
        - secret

    S3Connection:
      type: object
      description: AWS S3 connection configuration for DuckDB
      properties:
        accessKeyId:
          type: string
          description: AWS access key ID
        secretAccessKey:
          type: string
          description: AWS secret access key
        region:
          type: string
          description: AWS region (e.g., us-east-1)
          default: us-east-1
        endpoint:
          type: string
          description: Custom S3-compatible endpoint URL (optional, for MinIO, etc.)
        sessionToken:
          type: string
          description: AWS session token for temporary credentials (optional)
      required:
        - accessKeyId
        - secretAccessKey

    AzureConnection:
      type: object
      description: >
        Azure Data Lake Storage (ADLS Gen2) / Blob Storage connection
        configuration Supports https://, http://, abfss://, and az:// URL
        schemes.
      properties:
        authType:
          type: string
          enum: [service_principal, sas_token]
          description: Authentication method for Azure Storage
        sasUrl:
          type: string
          description: >
            Full SAS URL including token; required for sas_token auth. Supports
            single file, directory glob (*.ext), or recursive (**) patterns.
            Example:
            https://account.blob.core.windows.net/container/path/*.parquet?sp=rl&st=...
        tenantId:
          type: string
          description: Azure AD tenant ID (required for service_principal)
        clientId:
          type: string
          description: Azure AD application (client) ID (required for service_principal)
        clientSecret:
          type: string
          description: Azure AD client secret (required for service_principal)
        accountName:
          type: string
          description: Azure Storage account name (required for service_principal)
        fileUrl:
          type: string
          description: >
            Azure file URL to query; required for service_principal auth.
            Supports single file, directory glob (*.ext), or recursive (**)
            patterns. Example:
            https://account.blob.core.windows.net/container/path/**
      required:
        - authType

    DucklakeConnection:
      type: object
      description: DuckLake lakehouse connection configuration
      properties:
        storage:
          type: object
          description: Data storage connection configuration (S3 or GCS)
          properties:
            bucketUrl:
              type: string
              description:
                URL of the storage bucket (e.g. s3://my-bucket/path or
                gs://my-bucket/path)
            s3Connection:
              $ref: "#/components/schemas/S3Connection"
              description: AWS S3 connection configuration for data storage
            gcsConnection:
              $ref: "#/components/schemas/GCSConnection"
              description: Google Cloud Storage connection configuration for data storage
          required:
            - bucketUrl
        catalog:
          type: object
          description: Catalog metadata connection configuration
          properties:
            postgresConnection:
              $ref: "#/components/schemas/PostgresConnection"
              description: PostgreSQL connection for DuckLake metadata catalog
          required:
            - postgresConnection
      required:
        - storage
        - catalog
    BigqueryConnection:
      type: object
      description: Google BigQuery database connection configuration
      properties:
        defaultProjectId:
          type: string
          description: Default BigQuery project ID for queries
        billingProjectId:
          type: string
          description: BigQuery project ID for billing purposes
        location:
          type: string
          description: BigQuery dataset location/region
        serviceAccountKeyJson:
          type: string
          description: JSON string containing Google Cloud service account credentials
        maximumBytesBilled:
          type: string
          description: Maximum bytes to bill for query execution (prevents runaway costs)
        queryTimeoutMilliseconds:
          type: string
          description: Query timeout in milliseconds

    SnowflakeConnection:
      type: object
      description: Snowflake database connection configuration
      properties:
        account:
          type: string
          description: Snowflake account identifier
        username:
          type: string
          description: Snowflake username for authentication
        password:
          type: string
          description: Snowflake password for authentication
        privateKey:
          type: string
          description: Snowflake private key for authentication
        privateKeyPass:
          type: string
          description: Passphrase for the Snowflake private key
        warehouse:
          type: string
          description: Snowflake warehouse name
        database:
          type: string
          description: Snowflake database name
        schema:
          type: string
          description: Snowflake schema name
        role:
          type: string
          description: Snowflake role name
        responseTimeoutMilliseconds:
          type: integer
          description: Query response timeout in milliseconds

    TrinoConnection:
      type: object
      description: Trino database connection configuration
      properties:
        server:
          type: string
          description: Trino server hostname or IP address
        port:
          type: number
          description: Trino server port number
        catalog:
          type: string
          description: Trino catalog name
        schema:
          type: string
          description: Trino schema name
        user:
          type: string
          description: Trino username for authentication
        password:
          type: string
          description: Trino password for authentication
        peakaKey:
          type: string
          description: Peaka API key for authentication with Peaka-hosted Trino clusters

    DatabricksConnection:
      type: object
      description: Databricks SQL warehouse connection configuration
      properties:
        host:
          type: string
          description: Databricks workspace host (e.g.
            dbc-xxxxxxxx-xxxx.cloud.databricks.com)
        path:
          type: string
          description: SQL warehouse HTTP path (e.g. /sql/1.0/warehouses/<warehouse-id>)
        token:
          type: string
          description: Personal access token for authentication
        oauthClientId:
          type: string
          description: OAuth M2M client ID (service principal)
        oauthClientSecret:
          type: string
          description: OAuth M2M client secret (service principal)
        defaultCatalog:
          type: string
          description: Default Unity Catalog to use for queries
        defaultSchema:
          type: string
          description: Default schema to use for queries
        setupSQL:
          type: string
          description: SQL statements to run when the connection is established

    MotherDuckConnection:
      type: object
      description: MotherDuck database connection configuration
      properties:
        accessToken:
          type: string
          description: MotherDuck access token
        database:
          type: string
          description: MotherDuck database name

    PublisherConnection:
      type: object
      description: >
        Malloy Publisher proxy connection. Proxies SQL to a remote Publisher
        dataplane instead of connecting to a warehouse directly. The remote
        dataplane owns authentication, access control, and read-only
        enforcement.
      properties:
        connectionUri:
          type: string
          description: >
            Full URI of the remote connection, e.g.
            https://org.data.example.com/api/v0/environments/<env>/connections/<name>
        accessToken:
          type: string
          description: Bearer token for the remote dataplane (user-scoped, short-lived)
      required:
        - connectionUri

    DuckdbConnection:
      type: object
      description: >
        DuckDB database connection configuration. Publisher intentionally
        exposes only data-source intent here. Database files, working
        directories, filesystem/network policy, extension loading, setup SQL,
        temp directories, and resource knobs are owned by Publisher so
        environment configs cannot widen deployment policy through low-level
        DuckDB settings.
      properties:
        attachedDatabases:
          type: array
          items:
            $ref: "#/components/schemas/AttachedDatabase"

    AttachedDatabase:
      type: object
      description: Attached DuckDB database
      properties:
        name:
          type: string
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]*$"
          example: "test_connection, _connection, test_connection_1"
        type:
          type: string
          description: Type of database connection
          enum: [bigquery, snowflake, postgres, gcs, s3, azure]
        attributes:
          $ref: "#/components/schemas/ConnectionAttributes"
        bigqueryConnection:
          $ref: "#/components/schemas/BigqueryConnection"
        snowflakeConnection:
          $ref: "#/components/schemas/SnowflakeConnection"
        postgresConnection:
          $ref: "#/components/schemas/PostgresConnection"
        gcsConnection:
          $ref: "#/components/schemas/GCSConnection"
        s3Connection:
          $ref: "#/components/schemas/S3Connection"
        azureConnection:
          $ref: "#/components/schemas/AzureConnection"
    # TODO: What is this?  Can we remove it?
    SqlSource:
      type: object
      properties:
        resource:
          type: string
          description: Resource path to the sql source.
        # Pass source as an opaque JSON string that is malloyVersion dependent.
        source:
          type: string

    Table:
      type: object
      properties:
        resource:
          type: string
          description: Resource path to the table.
        source:
          type: string
          description: Table source as a JSON string.
        columns:
          description: Table fields
          type: array
          items:
            $ref: "#/components/schemas/Column"

    TemporaryTable:
      type: object
      properties:
        resource:
          type: string
          description: Resource path to the temporary table.
        # Pass table as an opaque JSON string that is malloyVersion dependent.
        table:
          type: string

    QueryData:
      type: object
      properties:
        resource:
          type: string
          description: Resource path to the query data.
        # Pass result as an opaque JSON string that is malloyVersion dependent.
        data:
          type: string

    Error:
      type: object
      description: Standard error response format
      properties:
        message:
          type: string
          description: Human-readable error message describing what went wrong
        details:
          type: string
          description: Additional error details or context
      required:
        - message

    Column:
      type: object
      description: Database column definition
      properties:
        name:
          type: string
          description: Name of the column
        type:
          type: string
          description: Data type of the column

    TableDescription:
      type: object
      description: Database table structure and metadata
      properties:
        name:
          type: string
          description: Name of the table
        rowCount:
          type: integer
          description: Number of rows in the table
        columns:
          type: array
          description: List of columns in the table
          items:
            $ref: "#/components/schemas/Column"

    WatchStatus:
      type: object
      description: Current file watching status and configuration
      properties:
        enabled:
          type: boolean
          description: Whether file watching is currently active
        environmentName:
          type: string
          description: Name of the environment being watched for file changes
        watchingPath:
          type: string
          description:
            The file system path being monitored for changes, null if not
            watching
      required:
        - enabled
        - environmentName
        - watchingPath

    StartWatchRequest:
      type: object
      description: Request to start file watching for an environment
      properties:
        environmentName:
          type: string
          description: Name of the environment to start watching for file changes
      required:
        - environmentName

    ConnectionStatus:
      type: object
      description: Result of testing a database connection
      properties:
        status:
          type: string
          description: Connection test result status
          enum: ["ok", "failed"]
        errorMessage:
          type: string
          description: Error message if the connection test failed, null if successful

    CompileRequest:
      type: object
      description: Request body for compiling Malloy source code
      properties:
        source:
          type: string
          description: Malloy source code to compile
        includeSql:
          type: boolean
          default: false
          description:
            If true, returns the generated SQL alongside compilation results
            (only available when compilation succeeds and the source contains a
            runnable query).
        givens:
          $ref: "#/components/schemas/Givens"
      required:
        - source

    CompileResult:
      type: object
      description: Result of a Malloy source compilation check
      properties:
        status:
          type: string
          description:
            Overall compilation status — "error" if any problems have error
            severity
          enum: ["success", "error"]
        problems:
          type: array
          description: List of compilation problems (errors and warnings)
          items:
            $ref: "#/components/schemas/CompileProblem"
        sql:
          type: string
          description:
            Generated SQL for the compiled query. Only present when includeSql
            is true and compilation succeeds with a runnable query.

    CompileProblem:
      type: object
      description: A compilation problem reported by the Malloy compiler
      properties:
        message:
          type: string
          description: Human-readable problem description
        severity:
          type: string
          description: Severity level of the problem
          enum: ["error", "warn", "debug"]
        code:
          type: string
          description: Machine-readable error code
        at:
          type: object
          description: Source location of the problem
          properties:
            url:
              type: string
              description: URL of the source file
            range:
              type: object
              description: Character range within the source file

    CreateMaterializationRequest:
      type: object
      description: >-
        Options for starting a materialization. Two modes — (1) auto-run
        (default), omit `buildInstructions` and the publisher self-assigns names
        and runs all phases in one pass; (2) orchestrated build, supply
        `buildInstructions` and the publisher builds directly into the
        caller-assigned names from the package's already-compiled build plan
        (read off `Package.buildPlan`).
      properties:
        buildInstructions:
          oneOf:
            - $ref: "#/components/schemas/BuildInstructions"
            - type: "null"
          description:
            Orchestrated build. When present, the publisher creates the
            materialization already building these caller-assigned sources
            (table id, physical name, realization) into the exact names
            provided — the caller derived these instructions from
            `Package.buildPlan` up front. Omit for auto-run (the publisher
            self-assigns names and builds all persist sources).
        forceRefresh:
          type: boolean
          default: false
          description:
            Build a new table even when a source's sourceEntityId is unchanged.
        sourceNames:
          type: array
          items:
            type: string
          description:
            Restrict the plan/build to these persist source names. Omit = all
            persist sources.

    MaterializationStatus:
      type: string
      description: Phase-aware status of a materialization run.
      enum:
        - PENDING
        - MANIFEST_ROWS_READY
        - MANIFEST_FILE_READY
        - FAILED
        - CANCELLED

    Materialization:
      type: object
      description: A record of one materialization run for a package.
      properties:
        id:
          type: string
        environmentId:
          type: string
        packageName:
          type: string
        status:
          $ref: "#/components/schemas/MaterializationStatus"
        manifest:
          oneOf:
            - $ref: "#/components/schemas/BuildManifest"
            - type: "null"
          description: Build output. Null until status = MANIFEST_FILE_READY.
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        error:
          type: ["string", "null"]
          description: Error message if the materialization failed
        metadata:
          type: ["object", "null"]
          description:
            Materialization metadata including build options, source counts,
            and durations. Free-form object — fields such as `trigger`
            (ON_DEMAND | SCHEDULER) live here deliberately, so a strict-schema
            client does not need to know them. Promoting any such field to a
            top-level `Materialization` property is a breaking schema change
            that orchestrated clients must adopt first; do not do it casually.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BuildPlan:
      type: object
      description: |
        The package's persist build plan. Mirrors Malloy's native build plan plus
        the minimal per-source detail a caller needs to assign
        identity/naming/realization. Lineage, policy, and connection capability
        are intentionally omitted until they carry real data.
      required: [graphs, sources]
      properties:
        graphs:
          type: array
          description: Dependency-ordered build graphs, one per connection.
          items:
            $ref: "#/components/schemas/BuildGraph"
        sources:
          type: object
          description: Map of sourceID ("sourceName@modelURL") to per-source plan.
          additionalProperties:
            $ref: "#/components/schemas/PersistSourcePlan"

    BuildGraph:
      type: object
      required: [connectionName, nodes]
      properties:
        connectionName:
          type: string
        nodes:
          type: array
          description:
            Leveled build nodes; each inner array is one parallelizable level,
            levels run in order.
          items:
            type: array
            items:
              $ref: "#/components/schemas/BuildNode"

    BuildNode:
      type: object
      required: [sourceID]
      properties:
        sourceID:
          type: string
          description: "sourceName@modelURL"
        dependsOn:
          type: array
          description: Upstream sourceIDs in this graph.
          items:
            type: string

    PersistSourcePlan:
      type: object
      required: [name, sourceID, connectionName, sourceEntityId, sql, columns]
      properties:
        name:
          type: string
        sourceID:
          type: string
        connectionName:
          type: string
        dialect:
          type: string
        sourceEntityId:
          type: string
          description: >-
            Stable, content-addressed identity of this persisted source. A
            deterministic UUID5 derived from the source's scope, its connection
            `fingerprint`, and its canonical compiled SQL — deliberately
            independent of package version, so it changes only when the source's
            data identity changes. Consumers treat it as an opaque token and use
            the supplied value verbatim.
        sql:
          type: string
          description:
            The source's build SQL (with the build manifest applied for upstream
            rewrites).
        refresh:
          type: ["string", "null"]
          description: >-
            The source's declared `#@ persist ... refresh=...` value
            ("full" | "incremental"), reported verbatim; null = unset.
            Metadata pass-through — inert to the publisher today.
        freshness:
          oneOf:
            - $ref: "#/components/schemas/Freshness"
            - type: "null"
          description: >-
            The source's EFFECTIVE freshness objective after most-specific-wins
            resolution (source > model-file > package). Null = unset at every
            level; the control plane applies the platform default. Reported
            verbatim (invalid fields dropped, never defaulted). Valid in both
            scope modes. (Per-source `sharing`/`schedule` were retired: scope is
            a single package-level mode and a schedule is package-root-only —
            declaring either on a source is a publish-time manifest error.)
        columns:
          type: array
          description: Output schema of the source.
          items:
            $ref: "#/components/schemas/Column"
        annotationFields:
          type: object
          additionalProperties:
            type: string
          description:
            All key=value fields of the source's `#@ persist` annotation (e.g.
            `name`, `realization`). The control plane uses `name` as the
            materialized table name (it may carry a dialect container path like
            `dataset.table`). Returned as the full set so new persist directives
            need no publisher change.
        modelPath:
          type: string
          description:
            Package-relative path of the `.malloy` model that declares this
            source (e.g. `order_rollup.malloy`). The source's sourceID embeds an
            absolute `file://` modelURL with no package boundary, so this is the
            only place the relative path is exposed; callers use it to deep-link
            the source back to its model.

    Realization:
      type: string
      enum: [SNAPSHOT, COPY]
      description: SNAPSHOT = warehouse clone/snapshot; COPY = CREATE TABLE AS SELECT.

    BuildInstructions:
      type: object
      description: Build input. Per-source instructions assigned by the caller.
      required: [sources]
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/BuildInstruction"
        referenceManifest:
          type: array
          description: >-
            Already-materialized persist upstreams the built sources may
            reference but which are NOT rebuilt in this run. The publisher seeds
            the build Manifest with these so a downstream source's upstream
            persist reference resolves to the existing physical table instead of
            recomputing it live. Only consumed on the orchestrated
            (buildInstructions) path; auto-run seeds its own reference set from
            the most-recent manifest.
          items:
            $ref: "#/components/schemas/ManifestReference"
        strictUpstreams:
          type: boolean
          default: false
          description: >-
            When true, a persist upstream that is neither built here nor present
            in referenceManifest fails the build (compiler strict mode) instead
            of silently recomputing it live. Per-unit dispatch should set this
            true.

    ManifestReference:
      type: object
      description: >-
        A reference to an already-materialized persist upstream that the built
        sources may read but which is not rebuilt in this run.
      required: [sourceEntityId, physicalTableName]
      properties:
        sourceEntityId:
          type: string
          description: >-
            The upstream's content id AS REPORTED BY THE PUBLISHER in
            PersistSourcePlan.sourceEntityId. It MUST equal what the compiler
            recomputes for the manifest lookup (mkBuildID over the upstream's
            manifest-ignorant SQL); do not substitute any other identity here.
        physicalTableName:
          type: string
          description: >-
            Fully-qualified physical table the upstream currently serves.
        connectionName:
          type: string
          description: >-
            The connection the upstream table lives on. The publisher quotes the
            reference for this connection's dialect when it seeds the build
            manifest, so a downstream persist source resolves the upstream on a
            case-folding engine (Snowflake). Optional: omit it and the reference
            seeds unquoted (the pre-existing behavior), which fails a downstream
            build on such an engine.

    BuildInstruction:
      type: object
      required:
        [sourceEntityId, materializedTableId, physicalTableName, realization]
      properties:
        sourceEntityId:
          type: string
          description: Identifies which planned source this instruction is for
            (matches PersistSourcePlan.sourceEntityId).
        sourceID:
          type: string
          description:
            Optional convenience echo of "sourceName@modelURL"; sourceEntityId
            is authoritative.
        materializedTableId:
          type: string
          description:
            Caller-assigned surrogate id for the materialized table about to be
            produced.
        physicalTableName:
          type: string
          description:
            Logical, fully-qualified (but unquoted) table name to create — an
            optional dialect container path plus the table name, e.g.
            `mydataset.engaged_events_<sourceEntityId>_v0`. The publisher dialect-quotes
            each segment when it emits the DDL, so quote-requiring names (a
            hyphenated BigQuery project id, a container path) are valid, and
            echoes this logical name back in the manifest.
        realization:
          $ref: "#/components/schemas/Realization"

    BuildManifest:
      type: object
      description:
        Build output. Maps each sourceEntityId a build produced to its physical
        table. Returned inline; the caller persists it.
      properties:
        builtAt:
          type: string
          format: date-time
        entries:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ManifestEntry"
          description: Map of sourceEntityId to manifest entry.
        strict:
          type: boolean
          description: Whether unresolved references should error.

    ManifestEntry:
      type: object
      description: A single entry in the build manifest.
      required: [sourceEntityId, physicalTableName]
      properties:
        sourceEntityId:
          type: string
        sourceName:
          type: string
        materializedTableId:
          type: string
          description: Echoes the caller-assigned id from the BuildInstruction.
        physicalTableName:
          type: string
          description:
            The logical (unquoted) name of the materialized table — echoes the
            BuildInstruction's physicalTableName so the control plane persists
            and matches on the same logical name it assigned.
        connectionName:
          type: string
        realization:
          $ref: "#/components/schemas/Realization"
        rowCount:
          type: ["integer", "null"]
        dataAsOf:
          type: string
          format: date-time
          description: >-
            Instant up to which the materialized artifact provably reflects its
            sources (full build: snapshot start). The freshness age anchor:
            age = now - dataAsOf. NOT build-completion time.
        freshnessWindowSeconds:
          type: integer
          format: int64
          description: Effective freshness window (SLO). Absent => un-gated (never stale).
        freshnessFallback:
          type: string
          enum: [live, stale_ok, fail]
          description: >-
            Per-version read-time policy when the entry is stale. Never combined
            across versions; each version's entries carry its own declared fallback.

  parameters:
    environmentName:
      name: environmentName
      in: path
      required: true
      description: Name of the environment
      schema:
        type: string
    packageName:
      name: packageName
      in: path
      required: true
      description: Name of the package
      schema:
        type: string
    materializationId:
      name: materializationId
      in: path
      required: true
      description: ID of the materialization
      schema:
        type: string
