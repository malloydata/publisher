name: k6 CRUD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  k6_crud_tests:
    name: k6 CRUD Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Cache Bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build server
        run: |
          echo "Bun cache hit: ${{ steps.bun-cache.outputs.cache-hit }}"
          bun install --frozen-lockfile
          bun run build
        env:
          BUN_CONFIG_SKIP_POSTINSTALL_SCRIPTS: "1"

      - name: Link local package
        run: |
          cd packages/server && npm link

      - name: Install k6-tests dependencies
        run: |
          cd packages/server/k6-tests
          bun install --frozen-lockfile

      - name: Generate k6 API clients
        run: |
          cd packages/server/k6-tests
          bun run generate-clients

      - name: Clone malloy-samples
        run: |
          cd packages/server/k6-tests
          bun run clone-malloy-samples

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start npx server
        run: |
          cd packages/server && npx malloy-publisher --port 4002 --server_root ./ &
          sleep 12
          # Verify server is running
          response=$(curl -s http://localhost:4002/api/v0/projects || echo "failed")
          if [ "$response" = "failed" ]; then
            echo "Server failed to start"
            exit 1
          fi
          echo "Response Data: $response"
          echo "Server is running on port 4002"
        env:
          DISABLE_RESPONSE_LOGGING: true

      - name: Run k6 CRUD Projects test
        uses: grafana/run-k6-action@v1
        with:
          path: packages/server/k6-tests/load-test/load-test-crud-projects.ts
        env:
          K6_PUBLISHER_URL: "http://localhost:4002"
          K6_PROJECT_NAME: "malloy-samples"

      - name: Run k6 CRUD Connections test
        uses: grafana/run-k6-action@v1
        with:
          path: packages/server/k6-tests/load-test/load-test-crud-connections.ts
        env:
          K6_PUBLISHER_URL: "http://localhost:4002"
          K6_PROJECT_NAME: "malloy-samples"

      - name: Run k6 CRUD Packages test
        uses: grafana/run-k6-action@v1
        with:
          path: packages/server/k6-tests/load-test/load-test-crud-packages.ts
        env:
          K6_PUBLISHER_URL: "http://localhost:4002"
          K6_PROJECT_NAME: "malloy-samples"
