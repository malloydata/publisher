name: Release (NPM + Docker)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (optional — defaults to npm patch bump of
          current sdk version)"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      branch_name: ${{ steps.bump.outputs.branch_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configure git
        run: |
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"

      - name: Bump version and create branch
        id: bump
        run: |
          set -euo pipefail

          PKGS="packages/sdk/package.json packages/app/package.json packages/server/package.json"

          # Rewrite the top-level "version" field in each workspace package.json.
          # We can't use `npm version --workspaces` here: this repo uses Bun's
          # `workspace:*` dependency protocol, which npm rejects with
          # EUNSUPPORTEDPROTOCOL. A direct, format-preserving replace avoids npm
          # entirely.
          set_version() {
            local ver="$1" f
            for f in $PKGS; do
              node -e '
                const fs = require("fs");
                const [p, ver] = process.argv.slice(1);
                const s = fs
                  .readFileSync(p, "utf8")
                  .replace(/("version"\s*:\s*")[^"]*(")/, `$1${ver}$2`);
                fs.writeFileSync(p, s);
              ' "$f" "$ver"
            done
          }

          bump_patch() {
            node -e 'const v=process.argv[1].split(".");v[2]=String(Number(v[2])+1);console.log(v.join("."))' "$1"
          }

          # A version is taken once its release branch or release tag exists, so
          # reruns don't collide with a previously prepared release.
          version_taken() {
            local v="$1"
            if git ls-remote --exit-code --heads origin "release/sdk-${v}" >/dev/null 2>&1; then
              return 0
            fi
            if git ls-remote --exit-code --tags origin "v${v}" >/dev/null 2>&1; then
              return 0
            fi
            return 1
          }

          if [ -n "${{ inputs.version }}" ]; then
            NEW_VERSION="${{ inputs.version }}"
            NEW_VERSION="${NEW_VERSION#v}"
            NEW_VERSION="$(echo "$NEW_VERSION" | tr -d '[:space:]')"
            echo "::notice title=Version::Using provided version $NEW_VERSION"
            if version_taken "$NEW_VERSION"; then
              echo "::error title=Version::release/sdk-${NEW_VERSION} or tag v${NEW_VERSION} already exists"
              exit 1
            fi
          else
            echo "::notice title=Version::No version provided — performing patch bump"
            CURRENT="$(node -p "require('./packages/sdk/package.json').version")"
            NEW_VERSION="$(bump_patch "$CURRENT")"
            while version_taken "$NEW_VERSION"; do
              echo "::notice title=Version::release/sdk-${NEW_VERSION} already exists — bumping again"
              NEW_VERSION="$(bump_patch "$NEW_VERSION")"
            done
          fi

          set_version "$NEW_VERSION"

          BRANCH_NAME="release/sdk-${NEW_VERSION}"
          git checkout -b "$BRANCH_NAME"

          git add $PKGS
          git commit -s -m "Release SDK/App version ${NEW_VERSION}"

          git push origin "$BRANCH_NAME"

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          echo "::notice title=Prepared Release::Version ${NEW_VERSION} on branch ${BRANCH_NAME}"

  publish-npm:
    needs: prepare
    uses: ./.github/workflows/npm-sdk.yml
    secrets: inherit
    with:
      ref: ${{ needs.prepare.outputs.branch_name }}

  publish-docker:
    needs: prepare
    uses: ./.github/workflows/docker-image.yml
    secrets: inherit
    with:
      current_version: ${{ needs.prepare.outputs.new_version }}
      ref: ${{ needs.prepare.outputs.branch_name }}

  gh-release:
    needs: [ prepare, publish-npm, publish-docker ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch_name }}
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.new_version }}
          BRANCH: ${{ needs.prepare.outputs.branch_name }}
        run: |
          TAG="v${VERSION}"

          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<EOF
          ## Release v${VERSION}

          ### 📦 NPM packages
          - [\`@malloy-publisher/sdk@${VERSION}\`](https://www.npmjs.com/package/@malloy-publisher/sdk/v/${VERSION})
          - [\`@malloy-publisher/app@${VERSION}\`](https://www.npmjs.com/package/@malloy-publisher/app/v/${VERSION})
          - [\`@malloy-publisher/server@${VERSION}\`](https://www.npmjs.com/package/@malloy-publisher/server/v/${VERSION})

          ### 🐳 Docker image
          \`\`\`
          docker pull ms2data/malloy-publisher:${VERSION}
          docker pull ms2data/malloy-publisher:latest
          \`\`\`

          ### ℹ️ Details
          - Release branch: \`${BRANCH}\`
          - Triggered by: @${{ github.actor }}
          EOF

          if [[ "$VERSION" == *-* ]]; then
            echo "::notice title=GitHub Release::Skipping release creation for prerelease version ${VERSION}"
            echo "## 🏷️ GitHub Release" >> $GITHUB_STEP_SUMMARY
            echo "Skipped for prerelease version \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Pin the changelog base to the immediately preceding release tag.
          # Each release is cut from a fresh release/sdk-* branch that is never
          # merged back to main, so prior release tags are not ancestors of this
          # release's commit. Left to --generate-notes alone, GitHub's ancestor
          # walk skips every diverged sibling tag and lands on the last tag still
          # in the mainline ancestry, producing a changelog spanning hundreds of
          # PRs. Selecting the previous tag by version sort and passing it as the
          # explicit start tag scopes the notes to just this release's changes.
          # Prerelease tags (containing a hyphen) are excluded so the base is
          # always the last stable release, consistent with the prerelease skip
          # above.
          git fetch --tags --force
          PREV_TAG="$(git tag -l 'v[0-9]*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | grep -vx "$TAG" | tail -1)"

          NOTES_START_ARGS=()
          if [ -n "$PREV_TAG" ]; then
            echo "::notice title=Changelog::Generating notes from ${PREV_TAG} to ${TAG}"
            NOTES_START_ARGS=(--notes-start-tag "$PREV_TAG")
          else
            echo "::notice title=Changelog::No previous tag found; using default note generation"
          fi

          gh release create "$TAG" \
            --target "$BRANCH" \
            --title "v${VERSION}" \
            --notes-file "$NOTES_FILE" \
            --generate-notes \
            "${NOTES_START_ARGS[@]}"

          echo "## 🏷️ GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "Created release [\`${TAG}\`](https://github.com/${{ github.repository }}/releases/tag/${TAG})" >> $GITHUB_STEP_SUMMARY
