name: build

on:
  push:
    branches: [main]
  pull_request:

env:
  BUN_VERSION: 1.3.13

# self contained tests
jobs:
  lint:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        # Building the SDK is necessary to generate the .d.ts files used for type checking.
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-
      - name: Typecheck
        run: |
          if [ "${{ steps.bun-cache.outputs.cache-hit }}" == "true" ]; then
            echo "Cache hit! Using cached dependencies..."
            bun install --frozen-lockfile --no-summary
          else
            echo "Cache miss! Installing dependencies..."
            bun install --frozen-lockfile
          fi
          bun run generate-api-types
          bun run build:sdk
          bun run typecheck
  lint_format:
    name: Lint and check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Cache Bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-
      - name: Install dependencies
        run: |
          echo "Bun cache hit: ${{ steps.bun-cache.outputs.cache-hit }}"
          bun install --frozen-lockfile
      - name: Check formatting
        run: bunx prettier './packages/**/*.{ts,tsx}' --check
      - name: Lint
        run: bun run lint
  runtime_test:
    name: ${{ matrix.runtime }} test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: npx
            port: 4002
          - runtime: bunx
            port: 4003
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-
      - name: build server
        run: |
          echo "Bun cache hit: ${{ steps.bun-cache.outputs.cache-hit }}"
          bun install --frozen-lockfile
          bun run build
        env:
          BUN_CONFIG_SKIP_POSTINSTALL_SCRIPTS: "1"
      - name: Link local package
        working-directory: packages/server
        run: |
          if [ "${{ matrix.runtime }}" = "bunx" ]; then
            bun link && bun link @malloy-publisher/server
          else
            npm link
          fi
      - name: Start server via ${{ matrix.runtime }}
        working-directory: packages/server
        run: |
          ${{ matrix.runtime }} malloy-publisher --port ${{ matrix.port }} --server_root ./ \
            > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          echo "Server PID: $(cat /tmp/server.pid)"
      - name: Wait for server to reach 'serving' state
        run: |
          SERVER_PID=$(cat /tmp/server.pid)
          for i in $(seq 1 60); do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "✗ Server process died"
              echo "--- server log ---"
              cat /tmp/server.log
              exit 1
            fi
            status=$(curl -sf http://localhost:${{ matrix.port }}/api/v0/status || true)
            state=$(echo "$status" | jq -r '.operationalState // empty')
            echo "[${i}s] operationalState=${state:-<no response>}"
            if [ "$state" = "serving" ]; then
              echo "✓ Server is serving after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not reach 'serving' within 60s"
          echo "--- server log ---"
          cat /tmp/server.log
          exit 1
      - name: Test list projects
        run: |
          response=$(curl -s http://localhost:${{ matrix.port }}/api/v0/projects)
          echo "API Response: $response"
          if echo "$response" | jq -e '. | length == 1' > /dev/null; then
            echo "✓ API test passed: Found 1 project"
          else
            echo "✗ API test failed: Expected 1 project, got different response"
            echo "--- server log ---"
            cat /tmp/server.log
            exit 1
          fi

  cross_platform_test:
    name: Cross Platform Tests
    uses: ./.github/workflows/cross-platform-tests.yml
