name: build

on:
  push:
    branches: [ main ]
  pull_request:

env:
  BUN_VERSION: 1.3.13
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# self contained tests
jobs:
  lint:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        # Building the SDK is necessary to generate the .d.ts files used for type checking.
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-
      - name: Typecheck
        run: |
          if [ "${{ steps.bun-cache.outputs.cache-hit }}" == "true" ]; then
            echo "Cache hit! Using cached dependencies..."
            bun install --frozen-lockfile --no-summary
          else
            echo "Cache miss! Installing dependencies..."
            bun install --frozen-lockfile
          fi
          bun run generate-api-types
          bun run build:sdk
          bun run typecheck
  lint_format:
    name: Lint and check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Cache Bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-
      - name: Install dependencies
        run: |
          echo "Bun cache hit: ${{ steps.bun-cache.outputs.cache-hit }}"
          bun install --frozen-lockfile
      - name: Check formatting
        run: bunx prettier './packages/**/*.{ts,tsx}' --check
      - name: Lint
        run: bun run lint
  # Smoke-tests the built server under two invocation scenarios.
  #
  # Note on scope: the published `bin` entry uses `#!/usr/bin/env node`, so the
  # CLI install paths (`npx malloy-publisher` and `bunx malloy-publisher`) both
  # require Node on PATH to resolve the shebang. Bun as a runtime works fine,
  # but the CLI wrapper currently goes through Node. These two legs test the
  # two layers separately:
  #
  #   npx        — End-user install path. Runs `npx malloy-publisher` against
  #                the locally linked package. Exercises bin resolution, the
  #                `#!/usr/bin/env node` shebang, and Node's ESM execution of
  #                the bundled `dist/server.mjs`. Node is required.
  #
  #   bun-direct — Runtime-level Bun compatibility. Removes Node from the
  #                runner and invokes `bun run ./dist/server.mjs` directly —
  #                bypassing the shebang. Proves that the ESM bundle itself
  #                executes correctly under Bun without any Node dependency
  #                at runtime.
  #
  # Future work: if the community asks for it, add support for
  # `bunx malloy-publisher` on a Node-less machine (would require a different
  # shebang strategy, e.g. a runtime-selecting shell launcher or a dedicated
  # Bun bin entry).
  runtime_test:
    name: ${{ matrix.runtime }} test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node-user install path: shebang-driven `npx` invocation.
          - runtime: npx
            port: 4002
          # Bun runtime compatibility: Node stripped from runner, `bun run` on
          # the built bundle. See the block comment above for why `bunx` is
          # not tested here.
          - runtime: bun-direct
            port: 4003
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - name: Setup Node.js
        if: matrix.runtime == 'npx'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-
      - name: build server
        run: |
          echo "Bun cache hit: ${{ steps.bun-cache.outputs.cache-hit }}"
          bun install --frozen-lockfile
          bun run build
        env:
          BUN_CONFIG_SKIP_POSTINSTALL_SCRIPTS: "1"
      - name: Remove Node.js (direct Bun leg only)
        if: matrix.runtime == 'bun-direct'
        run: |
          # The ubuntu-latest runner ships with Node preinstalled. Remove it so
          # the direct Bun leg genuinely proves Bun-only compatibility — no Node can
          # be shimmed in via PATH lookup or shebang resolution.
          sudo apt-get remove -y --purge nodejs nodejs-doc npm || true
          sudo rm -f /usr/local/bin/node /usr/local/bin/npm /usr/local/bin/npx
          sudo rm -rf /opt/hostedtoolcache/node
          hash -r
          if command -v node >/dev/null 2>&1; then
            echo "✗ 'node' is still on PATH at $(command -v node) — cannot prove Bun-only compatibility"
            exit 1
          fi
          echo "✓ Node removed; PATH=$PATH"
          command -v bun && bun --version
      - name: Link local package (npx only)
        if: matrix.runtime == 'npx'
        working-directory: packages/server
        run: |
          echo "→ npm link"
          npm link
      - name: Start server via ${{ matrix.runtime }}
        working-directory: packages/server
        run: |
          if [ "${{ matrix.runtime }}" = "bun-direct" ]; then
            # Bypass the `#!/usr/bin/env node` shebang by invoking Bun directly
            # on the bundled entry file. This validates direct Bun execution of
            # the built server artifact without depending on Node.
            echo "→ bun run ./dist/server.mjs"
            bun run ./dist/server.mjs --port ${{ matrix.port }} --server_root ./ \
              > /tmp/server.log 2>&1 &
          else
            echo "→ npx malloy-publisher (uses #!/usr/bin/env node shebang)"
            npx malloy-publisher --port ${{ matrix.port }} --server_root ./ \
              > /tmp/server.log 2>&1 &
          fi
          echo $! > /tmp/server.pid
          echo "Server PID: $(cat /tmp/server.pid)"
      - name: Wait for server to reach 'serving' state
        run: |
          SERVER_PID=$(cat /tmp/server.pid)
          for i in $(seq 1 60); do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "✗ Server process died"
              echo "--- server log ---"
              cat /tmp/server.log
              exit 1
            fi
            status=$(curl -sf http://localhost:${{ matrix.port }}/api/v0/status || true)
            state=$(echo "$status" | jq -r '.operationalState // empty')
            echo "[${i}s] operationalState=${state:-<no response>}"
            if [ "$state" = "serving" ]; then
              echo "✓ Server is serving after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not reach 'serving' within 60s"
          echo "--- server log ---"
          cat /tmp/server.log
          exit 1
      - name: Test list environments
        run: |
          response=$(curl -s http://localhost:${{ matrix.port }}/api/v0/environments)
          echo "API Response: $response"
          if echo "$response" | jq -e '. | length == 1' > /dev/null; then
            echo "✓ API test passed: Found 1 environment"
          else
            echo "✗ API test failed: Expected 1 envrionment, got different response"
            echo "--- server log ---"
            cat /tmp/server.log
            exit 1
          fi

  # Smoke-tests the production Docker image: builds it locally with the same
  # Dockerfile used for releases, runs it with the publisher port exposed, and
  # polls /api/v0/status until the server reports operationalState=serving.
  # This proves the image produced by `docker build` actually boots — not just
  # that the bundled .mjs executes under Bun (which runtime_test covers).
  docker_smoke_test:
    name: Docker smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: malloy-publisher:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start container
        run: |
          docker run -d --name malloy-publisher-smoke \
            -p 4000:4000 \
            malloy-publisher:smoke-test
          echo "Container ID: $(docker ps -q -f name=malloy-publisher-smoke)"
      - name: Wait for server to reach 'serving' state
        run: |
          for i in $(seq 1 90); do
            if ! docker ps -q -f name=malloy-publisher-smoke | grep -q .; then
              echo "✗ Container exited"
              echo "--- container logs ---"
              docker logs malloy-publisher-smoke || true
              exit 1
            fi
            status=$(curl -sf http://localhost:4000/api/v0/status || true)
            state=$(echo "$status" | jq -r '.operationalState // empty')
            echo "[${i}s] operationalState=${state:-<no response>}"
            if [ "$state" = "serving" ]; then
              echo "✓ Server is serving after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not reach 'serving' within 90s"
          echo "--- container logs ---"
          docker logs malloy-publisher-smoke || true
          exit 1
      - name: Test /api/v0/environments
        run: |
          response=$(curl -s http://localhost:4000/api/v0/environments)
          echo "API Response: $response"
          if echo "$response" | jq -e '. | type == "array"' > /dev/null; then
            echo "✓ /api/v0/environments returned a JSON array"
          else
            echo "✗ /api/v0/environments did not return a JSON array"
            echo "--- container logs ---"
            docker logs malloy-publisher-smoke || true
            exit 1
          fi
      - name: Container logs (always)
        if: always()
        run: docker logs malloy-publisher-smoke || true
      - name: Cleanup
        if: always()
        run: |
          docker rm -f malloy-publisher-smoke || true

  cross_platform_test:
    name: Cross Platform Tests
    uses: ./.github/workflows/cross-platform-tests.yml
