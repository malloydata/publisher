name: Publish SDK/APP to NPM

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out (branch, tag, or SHA)"
        required: false
        type: string

env:
  BUN_VERSION: 1.3.13
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Read current version
        id: version_step
        run: |
          CURRENT_VERSION=$(cat packages/sdk/package.json | grep '"version"' | sed 's/.*"version": "\(.*\)".*/\1/')

          # Stable versions publish under "latest"; any pre-release (0.0.189-dev,
          # 1.0.0-rc.1, 2.0.0-beta.2, etc.) publishes under "next".
          if [[ "$CURRENT_VERSION" == *-* ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi

          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "npm_tag=$NPM_TAG" >> $GITHUB_OUTPUT
          echo "::notice title=Current Version::Publishing SDK version $CURRENT_VERSION under npm dist-tag '$NPM_TAG'"

      - name: Install dependencies
        run: bun install

      - name: Resolve workspace:* for publishing (in-memory only, not committed)
        run: |
          sed -i "s/\"@malloy-publisher\/sdk\": \"workspace:\*\"/\"@malloy-publisher\/sdk\": \"^${{ steps.version_step.outputs.current_version }}\"/" packages/app/package.json

      - name: Build SDK package
        run: |
          cd packages/sdk
          NODE_ENV=production bun run build

      - name: Build App package
        run: |
          cd packages/app
          NODE_ENV=production bun run build

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          cd packages/sdk
          npm publish --access public --tag ${{ steps.version_step.outputs.npm_tag }}

          cd ../app
          npm publish --access public --tag ${{ steps.version_step.outputs.npm_tag }}

      - name: Build & publish Server package
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          cd packages/server
          NODE_ENV=production bun run build
          npm publish --access public --tag ${{ steps.version_step.outputs.npm_tag }}
